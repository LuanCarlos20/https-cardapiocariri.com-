<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .animate-pulse-green { animation: pulse-green 2s infinite; }
        .animate-pulse-red { animation: pulse-red 2s infinite; }
        
        .payment-btn.active { 
            background-color: #c2410c !important; 
            color: white !important; 
            border-color: #c2410c !important; 
        }

        .price-green { color: #22c55e; font-size: 1.5rem; font-weight: bold; }
        .border-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 12px; padding: 15px; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24">

    <header class="w-full h-[260px] bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        <button onclick="shareMenu()" class="absolute top-4 right-4 bg-green-600 text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-green-700 transition-all z-10 shadow-lg">
            <i class="fab fa-whatsapp"></i> Compartilhar
        </button>

        <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-center p-4">
            <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" alt="Logo" class="w-20 h-20 rounded-full object-cover border-2 border-white shadow-xl mb-2">
            <h1 class="text-white text-2xl font-serif font-bold">Pizzaria A Portuguesa</h1>
            <div id="status-loja" class="mt-2 text-white px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2 transition-all">
                <i class="fa fa-clock"></i> <span id="status-texto">Verificando...</span>
            </div>
            <p class="text-white/80 text-[11px] mt-2 font-medium tracking-wide">Dom a Seg: 16h às 00h • <span class="text-red-300">Terça: Fechado</span></p>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-md z-40 overflow-x-auto whitespace-nowrap p-3 flex gap-3 scrollbar-hide">
        <button onclick="filterCategory('todas')" class="px-5 py-2 rounded-full bg-orange-700 text-white text-sm font-semibold shadow-sm">Todas</button>
        <button onclick="filterCategory('pizzas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Pizzas</button>
        <button onclick="filterCategory('esfirras')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Esfirras</button>
        <button onclick="filterCategory('bebidas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Bebidas</button>
    </nav>

    <div class="max-w-6xl mx-auto px-4 mt-4">
        <div class="relative">
            <input type="text" id="search-input" oninput="searchProduct()" placeholder="Buscar no cardápio..." 
                   class="w-full bg-white border border-stone-200 rounded-2xl py-3.5 pl-11 pr-4 outline-none focus:ring-2 focus:ring-orange-500 transition-all shadow-sm">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 mt-2" id="menu-container"></main>

    <div id="pizza-modal" class="fixed inset-0 bg-black/70 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl max-h-[90vh] overflow-hidden flex flex-col relative">
            <div class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 id="modal-pizza-title" class="font-bold text-lg uppercase">ITEM</h2>
                <button onclick="closePizzaModal()" class="bg-red-500 text-white w-8 h-8 rounded-md text-xl font-bold">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                <div id="modal-pizza-price" class="price-green">R$ 0,00</div>
                
                <div class="flex justify-between items-center border-b pb-1">
                    <span id="modal-subtitle" class="font-bold text-sm">Opções de Sabores</span>
                    <span id="modal-limit-text" class="text-xs text-stone-500">Escolha os sabores</span>
                </div>

                <div id="sabores-lista" class="space-y-1 text-left"></div>

                <div id="extra-section" class="border-box text-left">
                    <p class="font-bold text-[10px] uppercase mb-3 tracking-widest text-stone-600" id="borda-titulo">BORDAS RECHEADAS</p>
                    <div id="bordas-lista" class="space-y-3"></div>
                </div>

                <div class="text-left">
                    <label class="font-bold text-sm">Observação</label>
                    <textarea id="pizza-obs" class="w-full border rounded-xl p-3 mt-1 outline-none focus:ring-1 focus:ring-green-500" placeholder="Ex: Sem cebola, bem assada..."></textarea>
                </div>

                <div class="mt-4 text-left">
                    <p class="font-bold text-sm mb-2">Quantidade</p>
                    <div class="flex items-center">
                        <button onclick="updateQty(-1)" class="bg-red-500 text-white w-12 h-12 rounded-l-xl font-bold text-xl">-</button>
                        <div id="pizza-qty" class="flex-1 h-12 border-t border-b flex items-center justify-center font-bold text-lg">1</div>
                        <button onclick="updateQty(1)" class="bg-green-500 text-white w-12 h-12 rounded-r-xl font-bold text-xl">+</button>
                    </div>
                </div>
            </div>

            <div class="p-4 border-t bg-white">
                <button onclick="confirmPizza()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl uppercase tracking-wider">
                    Adicionar ao Carrinho
                </button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-stone-200 p-4 flex items-center justify-between z-50">
        <div class="flex flex-col text-left">
            <span class="text-[10px] text-stone-500 uppercase font-bold tracking-widest">Total + Entrega</span>
            <span class="text-xl font-bold text-orange-800" id="cart-total">R$ 0,00</span>
        </div>
        <button onclick="toggleModal(true)" class="bg-orange-700 hover:bg-orange-800 text-white px-8 py-3.5 rounded-2xl font-bold flex items-center gap-2 transition-all shadow-lg">
            Ver Pedido <i class="fa fa-shopping-basket"></i>
        </button>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-stone-400 text-3xl">&times;</button>
            <h2 class="text-2xl font-serif font-bold mb-6 border-b pb-4 text-stone-800 text-left">Meu Pedido</h2>
            <div id="cart-items" class="space-y-4 mb-6"></div>
            <div class="mb-6 bg-stone-50 p-4 rounded-2xl border border-stone-200 text-sm text-left">
                <label class="font-bold mb-2 block text-stone-700">Bairro para Entrega:</label>
                <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-3 bg-white border mb-3">
                    <option value="0" data-fee="0">Selecione seu bairro...</option>
                    <option value="Centro" data-fee="3.00">Centro (R$ 3,00)</option>
                    <option value="Cirolândia" data-fee="3.50">Cirolândia (R$ 3,50)</option>
                    <option value="Malvinas" data-fee="4.00">Malvinas (R$ 4,00)</option>
                    <option value="Outros" data-fee="6.00">Outros (R$ 6,00)</option>
                </select>
                <div class="flex justify-between font-bold text-lg text-orange-800 border-t pt-2 mt-2">
                    <span>Total:</span> <span id="summary-total">R$ 0,00</span>
                </div>
            </div>
            <div class="space-y-4">
                <p class="text-sm font-bold text-left text-stone-700">Forma de Pagamento:</p>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Pix</button>
                    <button type="button" onclick="setPayment('Cartao')" id="pay-Cartao" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Cartão</button>
                    <button type="button" onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Dinheiro</button>
                </div>
                <div id="troco-container" class="hidden text-left bg-orange-50 p-3 rounded-xl border border-orange-100">
                    <input type="number" id="valor-troco" placeholder="Troco para quanto?" class="w-full border rounded-xl p-3 outline-orange-500">
                </div>
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full border rounded-xl p-3 outline-orange-500">
                <input type="text" id="cust-address" placeholder="Endereço Completo" class="w-full border rounded-xl p-3 outline-orange-500">
                <button onclick="sendOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl text-lg shadow-lg transition-colors mt-2">Finalizar no WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        const STORE_NAME = "Pizzaria A Portuguesa";
        
        const SABORES_PIZZA = [
            { id: 1, nome: "01 americana", preco: 36, desc: "molho, presunto, mussarela, ovos, bacon..." },
            { id: 2, nome: "02 atum", preco: 31, desc: "molho, atum ralado, cebola..." },
            { id: 3, nome: "03 bacon", preco: 33, desc: "molho, mussarela, bacon..." },
            { id: 10, nome: "10 calabresa com mussarela", preco: 33, desc: "molho, mussarela, calabresa..." }
        ];

        const ESFIRRAS_DATA = {
            'TRADICIONAIS': [
                { id: 48, nome: "48 bacon", preco: 7.00 },
                { id: 49, nome: "49 calabresa c/ mussarela", preco: 7.00 },
                { id: 56, nome: "56 mussarela", preco: 6.00 }
            ],
            'ESPECIAIS': [
                { id: 59, nome: "59 americana", preco: 9.00 },
                { id: 69, nome: "69 camarão", preco: 11.00 }
            ],
            'DOCES': [
                { id: 91, nome: "91 brigadeiro", preco: 9.00 },
                { id: 93, nome: "93 sensação", preco: 10.00 }
            ]
        };

        const BORDAS = [
            { nome: "cheddar", preco: 7 },
            { nome: "catupiry", preco: 7 },
            { nome: "chocolate", preco: 8 }
        ];

        const BEBIDAS = [
            { id: 201, name: "Coca-Cola 2L", price: 12.00, desc: "Gelada", img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" }
        ];

        let cart = [];
        let curItem = { type: '', size: '', flavors: [], border: null, qty: 1 };
        let paymentMethod = "";

        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";

            if(cat === 'todas' || cat === 'pizzas') {
                ['P', 'M', 'G', 'GG'].forEach(s => {
                    container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 text-left min-w-0">
                            <h3 class="font-bold text-sm uppercase">PIZZA (${s})</h3>
                            <button onclick="openModal('pizza', '${s}')" class="mt-4 w-full bg-green-500 text-white py-2 rounded-full font-bold text-xs">Escolher Sabores</button>
                            <p class="text-[10px] text-stone-400 mt-1">Ver Valores</p>
                        </div>
                    </div>`;
                });
            }

            if(cat === 'todas' || cat === 'esfirras') {
                Object.keys(ESFIRRAS_DATA).forEach(tipo => {
                    container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                        <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 text-left min-w-0">
                            <h3 class="font-bold text-sm uppercase font-serif">ESFIRRAS ${tipo}</h3>
                            <button onclick="openModal('esfirra', '${tipo}')" class="mt-4 w-full bg-green-500 text-white py-2 rounded-full font-bold text-xs">Ver Sabores</button>
                        </div>
                    </div>`;
                });
            }

            if(cat === 'todas' || cat === 'bebidas') {
                BEBIDAS.forEach(p => {
                    container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                        <img src="${p.img}" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 min-w-0 text-left">
                            <h3 class="font-bold text-sm">${p.name}</h3>
                            <p class="text-orange-700 font-bold text-sm">R$ ${p.price.toFixed(2)}</p>
                            <button onclick="addToCartDirect(${p.id})" class="mt-2 w-full bg-stone-900 text-white py-2 rounded-xl text-xs font-bold">Adicionar</button>
                        </div>
                    </div>`;
                });
            }
        }

        function openModal(type, selection) {
            curItem = { type, size: selection, flavors: [], border: null, qty: 1 };
            document.getElementById('modal-pizza-title').innerText = type === 'pizza' ? `PIZZA (${selection})` : `ESFIRRAS ${selection}`;
            document.getElementById('modal-subtitle').innerText = type === 'pizza' ? "Opções de Sabores" : "Escolha os Sabores";
            document.getElementById('modal-limit-text').innerText = type === 'pizza' ? "Escolha até 2" : "Mínimo: 1";
            
            const extraSec = document.getElementById('extra-section');
            if(type === 'pizza') {
                extraSec.classList.remove('hidden');
                document.getElementById('borda-titulo').innerText = `BORDAS RECHEADAS ${selection}`;
                renderBordas();
            } else {
                extraSec.classList.add('hidden');
            }

            renderSaboresModal(type, selection);
            updateModalPrice();
            document.getElementById('pizza-modal').classList.remove('hidden');
        }

        function renderSaboresModal(type, selection) {
            const lista = type === 'pizza' ? SABORES_PIZZA : ESFIRRAS_DATA[selection];
            document.getElementById('sabores-lista').innerHTML = lista.map(s => `
                <div class="flex items-center justify-between py-2 border-b border-stone-50">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" onchange="toggleSabor(${s.id}, '${type}')" class="w-5 h-5 accent-green-600">
                        <div><p class="text-sm font-bold uppercase">${s.nome}</p></div>
                    </div>
                    <span class="text-sm font-bold">R$ ${s.preco.toFixed(2)}</span>
                </div>`).join('');
        }

        function toggleSabor(id, type) {
            const idx = curItem.flavors.indexOf(id);
            if(idx > -1) curItem.flavors.splice(idx, 1);
            else {
                if(type === 'pizza' && curItem.flavors.length >= 2) return alert("Máximo 2 sabores!");
                curItem.flavors.push(id);
            }
            updateModalPrice();
        }

        function renderBordas() {
            document.getElementById('bordas-lista').innerHTML = BORDAS.map(b => `
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <input type="radio" name="borda" onchange="setBorda('${b.nome}')" class="w-5 h-5 accent-green-600">
                        <span class="text-sm uppercase">${b.nome}</span>
                    </div>
                    <span class="text-sm font-bold">R$ ${b.preco.toFixed(2)}</span>
                </div>`).join('');
        }

        function setBorda(nome) { curItem.border = BORDAS.find(b => b.nome === nome); updateModalPrice(); }
        function updateQty(v) { curItem.qty = Math.max(1, curItem.qty + v); document.getElementById('pizza-qty').innerText = curItem.qty; updateModalPrice(); }

        function updateModalPrice() {
            let total = 0;
            if(curItem.type === 'pizza') {
                const precos = curItem.flavors.map(id => SABORES_PIZZA.find(s => s.id === id).preco);
                total = (precos.length ? Math.max(...precos) : 0) + (curItem.border ? curItem.border.preco : 0);
            } else {
                total = curItem.flavors.reduce((acc, id) => {
                    const s = ESFIRRAS_DATA[curItem.size].find(x => x.id === id);
                    return acc + s.preco;
                }, 0);
            }
            document.getElementById('modal-pizza-price').innerText = `R$ ${(total * curItem.qty).toFixed(2)}`;
        }

        function confirmPizza() {
            if(!curItem.flavors.length) return alert("Escolha pelo menos um sabor!");
            
            const listaSaber = curItem.type === 'pizza' ? SABORES_PIZZA : ESFIRRAS_DATA[curItem.size];
            const nomes = curItem.flavors.map(id => listaSaber.find(s => s.id === id).nome).join(' / ');
            const precoFinal = parseFloat(document.getElementById('modal-pizza-price').innerText.replace('R$ ', ''));

            cart.push({
                name: curItem.type === 'pizza' ? `Pizza (${curItem.size}) - ${nomes}` : `Esfirras ${curItem.size} - ${nomes}`,
                price: precoFinal,
                extra: curItem.border ? `Borda: ${curItem.border.nome}` : "",
                obs: document.getElementById('pizza-obs').value,
                qty: curItem.qty
            });
            
            closePizzaModal();
            updateCartUI();
        }

        function closePizzaModal() { document.getElementById('pizza-modal').classList.add('hidden'); }
        function toggleModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }
        function setPayment(m) { 
            paymentMethod = m; 
            document.querySelectorAll('.payment-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`pay-${m}`).classList.add('active'); 
            document.getElementById('troco-container').classList.toggle('hidden', m !== 'Dinheiro');
        }

        function updateCartUI() {
            const d = document.getElementById('delivery-location');
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee') || 0);
            const subtotal = cart.reduce((a, c) => a + c.price, 0);
            document.getElementById('cart-total').innerText = `R$ ${(subtotal + fee).toFixed(2)}`;
            document.getElementById('summary-total').innerText = `R$ ${(subtotal + fee).toFixed(2)}`;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="bg-stone-50 p-3 rounded-xl border mb-3 text-left">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm">${item.qty}x ${item.name}</p>
                            <p class="text-[10px] text-stone-500">${item.extra} ${item.obs ? '| '+item.obs : ''}</p>
                            <p class="text-xs font-bold text-orange-700">R$ ${item.price.toFixed(2)}</p>
                        </div>
                        <button onclick="removeItem(${i})" class="text-red-400 p-2"><i class="fa fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }

        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }

        function sendOrder() {
            const d = document.getElementById('delivery-location'), n = document.getElementById('cust-name').value, a = document.getElementById('cust-address').value;
            if(!cart.length || d.value === "0" || !paymentMethod || !n || !a) return alert("Preencha todos os campos!");
            
            let msg = `*PEDIDO - ${STORE_NAME}*\n\n👤 *Cliente:* ${n}\n📍 *End:* ${a}\n💳 *Pag:* ${paymentMethod}\n\n🛒 *ITENS:*\n`;
            cart.forEach(i => msg += `• ${i.qty}x ${i.name} ${i.extra ? '('+i.extra+')' : ''}\n`);
            msg += `\n*Total:* ${document.getElementById('summary-total').innerText}`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        function checkStoreStatus() {
            const now = new Date(), h = now.getHours();
            const open = (h >= 16 && h < 24) && (now.getDay() !== 2);
            document.getElementById('status-loja').className = `mt-2 text-white px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2 ${open ? 'bg-green-600 animate-pulse-green' : 'bg-red-600 animate-pulse-red'}`;
            document.getElementById('status-texto').innerText = open ? "Aberto Agora" : "Fechado Agora";
        }

        checkStoreStatus();
        renderMenu();
    </script>
</body>
</html>
