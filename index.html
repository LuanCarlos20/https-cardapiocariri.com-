<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }
        .animate-pulse-green { animation: pulse-green 2s infinite; }
        .payment-btn.active { background-color: #c2410c !important; color: white !important; border-color: #c2410c !important; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24">

    <header class="w-full h-[260px] bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative text-center">
        <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center p-4">
            <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-20 h-20 rounded-full border-2 border-white mb-2 shadow-xl">
            <h1 class="text-white text-2xl font-serif font-bold">Pizzaria A Portuguesa</h1>
            <div id="status-loja" class="mt-2 text-white px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2 bg-green-600 animate-pulse-green">
                <i class="fa fa-clock"></i> Aberto Agora
            </div>
            <p class="text-white/80 text-[11px] mt-2 font-medium tracking-wide">Dom a Seg: 16h às 00h • <span class="text-red-300">Terça: Fechado</span></p>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-md z-40 overflow-x-auto whitespace-nowrap p-3 flex gap-3 scrollbar-hide">
        <button onclick="filterCategory('todas')" class="px-5 py-2 rounded-full bg-orange-700 text-white text-sm font-semibold shadow-sm">Todas</button>
        <button onclick="filterCategory('pizzas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm font-medium">Pizzas</button>
        <button onclick="filterCategory('esfirras')" class="px-5 py-2 rounded-full bg-stone-100 text-sm font-medium">Esfirras</button>
        <button onclick="filterCategory('bebidas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm font-medium">Bebidas</button>
    </nav>

    <div class="max-w-6xl mx-auto px-4 mt-4">
        <input type="text" id="search-input" oninput="searchProduct()" placeholder="Buscar no cardápio..." 
               class="w-full bg-white border border-stone-200 rounded-2xl py-3.5 px-4 outline-none focus:ring-2 focus:ring-orange-500 shadow-sm">
    </div>

    <section id="custom-pizza-section" class="max-w-6xl mx-auto p-4 mt-2">
        <div class="bg-orange-700 rounded-3xl p-5 text-white shadow-xl">
            <h2 class="text-lg font-serif font-bold mb-3 flex items-center gap-2"><i class="fa fa-pizza-slice"></i> Monte sua Meio a Meio</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-stone-900">
                <select id="size-select" class="p-3 rounded-xl bg-white text-sm font-bold">
                    <option value="P" data-price="35">P (4 fatias) - R$ 35,00</option>
                    <option value="M" data-price="45" selected>M (6 fatias) - R$ 45,00</option>
                    <option value="G" data-price="55">G (8 fatias) - R$ 55,00</option>
                </select>
                <select id="flavor1" class="p-3 rounded-xl bg-white text-sm">
                    <option value="Calabresa">Sabor 1: Calabresa</option>
                    <option value="Bacon">Sabor 1: Bacon</option>
                    <option value="Queijo">Sabor 1: Queijo</option>
                    <option value="Frango com Catupiry">Sabor 1: Frango c/ Catupiry</option>
                </select>
                <select id="flavor2" class="p-3 rounded-xl bg-white text-sm">
                    <option value="Mesmo Sabor">Sabor 2: (Inteira)</option>
                    <option value="Bacon">Sabor 2: Bacon</option>
                    <option value="Queijo">Sabor 2: Queijo</option>
                    <option value="Calabresa">Sabor 2: Calabresa</option>
                </select>
            </div>
            <button onclick="addCustomPizza()" class="w-full mt-3 bg-white text-orange-800 font-bold py-3 rounded-xl hover:bg-stone-100 transition shadow-lg text-sm">
                Adicionar Pizza Montada
            </button>
        </div>
    </section>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 mt-2" id="menu-container"></main>

    <footer class="fixed bottom-0 w-full bg-white border-t border-stone-200 p-4 flex items-center justify-between z-50">
        <div class="flex flex-col text-left">
            <span class="text-[10px] text-stone-500 uppercase font-bold tracking-widest">Total + Entrega</span>
            <span class="text-xl font-bold text-orange-800" id="cart-total">R$ 0,00</span>
        </div>
        <button onclick="toggleModal(true)" class="bg-orange-700 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg">Ver Pedido</button>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-stone-400 text-3xl">&times;</button>
            <h2 class="text-2xl font-serif font-bold mb-4 border-b pb-2">Meu Pedido</h2>
            <div id="cart-items" class="space-y-4 mb-4"></div>

            <div class="mb-4 bg-stone-50 p-4 rounded-2xl border text-sm text-left">
                <label class="font-bold block text-stone-700">Bairro para Entrega:</label>
                <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-3 bg-white border mb-2">
                    <option value="0" data-fee="0">Selecione seu bairro...</option>
                    <option value="Centro" data-fee="3.00">Centro (R$ 3,00)</option>
                    <option value="Cirolândia" data-fee="3.50">Cirolândia (R$ 3,50)</option>
                    <option value="Malvinas" data-fee="4.00">Malvinas (R$ 4,00)</option>
                </select>
                <div class="flex justify-between font-bold text-lg text-orange-800 border-t pt-2">
                    <span>Total:</span> <span id="summary-total">R$ 0,00</span>
                </div>
            </div>

            <div class="space-y-3">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Pix</button>
                    <button onclick="setPayment('Cartao')" id="pay-Cartao" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Cartão</button>
                    <button onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Dinheiro</button>
                </div>
                <div id="troco-container" class="hidden"><input type="number" id="valor-troco" placeholder="Troco para quanto?" class="w-full border rounded-xl p-3 text-sm"></div>
                <div id="cartao-container" class="hidden"><select id="tipo-cartao" class="w-full border rounded-xl p-3 bg-white text-sm"><option value="Débito">Débito</option><option value="Crédito">Crédito</option></select></div>
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full border rounded-xl p-3 text-sm">
                <input type="text" id="cust-address" placeholder="Endereço (Rua, Nº, Ref)" class="w-full border rounded-xl p-3 text-sm">
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg">Finalizar Pedido <i class="fab fa-whatsapp ml-1"></i></button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        const PRODUCTS = [];
        let cart = [];
        let paymentMethod = "";

        // Gerar 250 itens como antes
        for(let i=1; i<=100; i++) PRODUCTS.push({ id: i, cat: 'pizzas', name: `Pizza ${i}`, price: 45.00, desc: "Sabor tradicional da casa.", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" });
        for(let i=101; i<=200; i++) PRODUCTS.push({ id: i, cat: 'esfirras', name: `Esfirra ${i-100}`, price: 6.00, desc: "Massa leve e fofinha.", img: "https://images.unsplash.com/photo-1628191139360-4083564d03fd?w=200" });
        for(let i=201; i<=250; i++) PRODUCTS.push({ id: i, cat: 'bebidas', name: `Bebida ${i-200}`, price: 12.00, desc: "Gelada e refrescante.", img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" });

        function addCustomPizza() {
            const sizeSel = document.getElementById('size-select');
            const p = parseFloat(sizeSel.options[sizeSel.selectedIndex].getAttribute('data-price'));
            const f1 = document.getElementById('flavor1').value;
            const f2 = document.getElementById('flavor2').value;
            const name = f2 === "Mesmo Sabor" ? `Pizza ${f1} (${sizeSel.value})` : `Pizza Meio ${f1} / Meio ${f2} (${sizeSel.value})`;
            
            cart.push({ id: Date.now(), cat: 'pizzas', name: name, price: p, extra: "Sem Borda Recheada", extraPrice: 0 });
            updateCartUI();
            alert("Pizza montada adicionada!");
        }

        function renderMenu(items = PRODUCTS) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                    <img src="${p.img}" class="w-20 h-20 rounded-xl object-cover">
                    <div class="flex-1 text-left">
                        <div class="flex justify-between items-start"><h3 class="font-bold text-sm">${p.name}</h3><span class="text-orange-700 font-bold text-sm">R$ ${p.price.toFixed(2)}</span></div>
                        <p class="text-[10px] text-stone-500 mb-2">${p.desc}</p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-stone-900 text-white py-2 rounded-xl text-xs font-bold hover:bg-orange-700 transition">Adicionar</button>
                    </div>
                </div>`).join('');
        }

        function addToCart(id) {
            const p = PRODUCTS.find(x => x.id === id);
            cart.push({...p, extra: p.cat === 'pizzas' ? "Sem Borda Recheada" : "", extraPrice: 0});
            updateCartUI();
        }

        function filterCategory(cat) { 
            renderMenu(cat === 'todas' ? PRODUCTS : PRODUCTS.filter(p => p.cat === cat));
            document.getElementById('custom-pizza-section').style.display = (cat === 'pizzas' || cat === 'todas') ? 'block' : 'none';
        }

        function searchProduct() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderMenu(PRODUCTS.filter(p => p.name.toLowerCase().includes(term)));
        }

        function toggleModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }

        function setPayment(m) { 
            paymentMethod = m; 
            document.querySelectorAll('.payment-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`pay-${m}`).classList.add('active'); 
            document.getElementById('troco-container').classList.toggle('hidden', m !== 'Dinheiro');
            document.getElementById('cartao-container').classList.toggle('hidden', m !== 'Cartao');
        }

        function updateCartUI() {
            const d = document.getElementById('delivery-location');
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee') || 0);
            const totalItems = cart.reduce((a, c) => a + c.price + (c.extraPrice || 0), 0);
            document.getElementById('cart-total').innerText = `R$ ${(totalItems + fee).toFixed(2)}`;
            document.getElementById('summary-total').innerText = `R$ ${(totalItems + fee).toFixed(2)}`;
            
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="bg-stone-50 p-3 rounded-xl border text-left">
                    <div class="flex justify-between">
                        <p class="font-bold text-sm">${item.name}</p>
                        <button onclick="cart.splice(${i}, 1); updateCartUI();" class="text-red-500 text-xs">Remover</button>
                    </div>
                    <p class="text-xs text-orange-700 font-bold mb-2">R$ ${(item.price + item.extraPrice).toFixed(2)}</p>
                    ${item.cat === 'pizzas' ? `
                    <div class="flex gap-1">
                        <button onclick="cart[${i}].extra='Catupiry'; cart[${i}].extraPrice=2; updateCartUI();" class="flex-1 text-[9px] border py-1 rounded ${item.extraPrice === 2 ? 'bg-orange-700 text-white' : 'bg-white'}">+Catupiry</button>
                        <button onclick="cart[${i}].extra='Cheddar'; cart[${i}].extraPrice=3; updateCartUI();" class="flex-1 text-[9px] border py-1 rounded ${item.extraPrice === 3 ? 'bg-orange-700 text-white' : 'bg-white'}">+Cheddar</button>
                    </div>` : ''}
                </div>`).join('');
        }

        function sendOrder() {
            const d = document.getElementById('delivery-location'), n = document.getElementById('cust-name').value, a = document.getElementById('cust-address').value;
            if(!cart.length || d.value === "0" || !paymentMethod || !n) return alert("Preencha todos os campos!");
            
            let detPag = paymentMethod;
            if(paymentMethod==='Dinheiro') detPag += ` (Troco para ${document.getElementById('valor-troco').value})`;
            if(paymentMethod==='Cartao') detPag += ` (${document.getElementById('tipo-cartao').value})`;

            let msg = `*PEDIDO - PIZZARIA A PORTUGUESA*\n\n👤 *Cliente:* ${n}\n📍 *End:* ${a}\n🏘️ *Bairro:* ${d.value}\n💳 *Pag:* ${detPag}\n\n🛒 *ITENS:*\n`;
            cart.forEach(i => {
                msg += `• ${i.name} (R$ ${i.price.toFixed(2)})\n`;
                if(i.extraPrice > 0) msg += `  └ _${i.extra}_ (+R$${i.extraPrice.toFixed(2)})\n`;
            });
            const sub = cart.reduce((a,c)=>a+c.price+c.extraPrice,0);
            msg += `\n*Entrega:* R$ ${parseFloat(d.options[d.selectedIndex].getAttribute('data-fee')).toFixed(2)}\n*TOTAL: R$ ${(sub + parseFloat(d.options[d.selectedIndex].getAttribute('data-fee'))).toFixed(2)}*\n\n⏱️ *Preparo:* 30 a 50 min`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        renderMenu();
    </script>
</body>
</html>
