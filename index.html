<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria A Portuguesa - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .payment-btn.active { background-color: #c2410c !important; color: white !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="w-full h-48 bg-stone-900 relative flex flex-col items-center justify-center text-center p-4 overflow-hidden">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000" class="absolute inset-0 w-full h-full object-cover opacity-40">
        <div class="relative z-10">
            <img id="logo-header" src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-20 h-20 rounded-full border-4 border-orange-600 mx-auto mb-2">
            <h1 class="text-white text-3xl font-serif font-bold">Pizzaria A Portuguesa</h1>
            <button onclick="openAdmin()" class="text-white/50 text-xs mt-2 hover:text-white"><i class="fas fa-lock"></i> Painel Admin</button>
        </div>
    </header>

    <div class="p-4 max-w-4xl mx-auto">
        <div class="relative">
            <input type="text" id="search-input" oninput="renderMenu()" placeholder="Buscar sabor ou bebida..." class="w-full p-4 pl-12 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-orange-500 outline-none">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
        </div>
    </div>

    <main id="menu-container" class="max-w-4xl mx-auto p-4 space-y-4"></main>

    <div id="pizza-modal" class="fixed inset-0 bg-black/70 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-4 border-b flex justify-between items-center bg-white sticky top-0">
                <h2 id="modal-title" class="font-bold text-lg uppercase">PIZZA (P)</h2>
                <button onclick="closeModal()" class="bg-red-500 text-white w-8 h-8 rounded-lg font-bold">×</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide text-left">
                <div id="modal-price-display" class="text-3xl font-bold text-green-600">R$ 0,00</div>
                
                <div>
                    <div class="flex justify-between items-center border-b pb-2 mb-3">
                        <span class="font-bold text-stone-700">Opções de Sabores</span>
                        <span class="text-xs text-stone-400 italic">Escolha até 2</span>
                    </div>
                    <div id="sabores-container" class="space-y-3"></div>
                </div>

                <div id="borda-section" class="bg-stone-50 p-4 rounded-2xl border border-stone-100">
                    <p class="font-bold text-xs uppercase tracking-widest text-stone-500 mb-3">Bordas Recheadas</p>
                    <div id="bordas-container" class="space-y-2"></div>
                </div>

                <textarea id="item-obs" class="w-full p-4 bg-stone-100 rounded-2xl border-none outline-none focus:ring-1 focus:ring-green-500" placeholder="Alguma observação? (ex: sem cebola)"></textarea>
            </div>

            <div class="p-4 bg-white border-t">
                <button onclick="addToCart()" class="w-full bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-green-600 transition-all uppercase">Adicionar ao Carrinho</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-stone-800 uppercase">Configurações do Cardápio</h2>
                <button onclick="closeAdmin()" class="text-2xl text-stone-400">&times;</button>
            </div>
            
            <div class="space-y-8">
                <section>
                    <h3 class="font-bold text-orange-700 border-b pb-2 mb-4">Pizzas & Sabores</h3>
                    <div id="admin-pizzas-list" class="space-y-4"></div>
                </section>

                <section>
                    <h3 class="font-bold text-orange-700 border-b pb-2 mb-4">Bebidas & Outros</h3>
                    <div id="admin-bebidas-list" class="space-y-4"></div>
                </section>

                <button onclick="saveAdmin()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-bold shadow-xl">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex items-center justify-between z-50 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <div class="text-left">
            <span class="text-[10px] text-stone-400 uppercase font-bold">Total do Pedido</span>
            <div id="cart-total" class="text-xl font-bold text-orange-800">R$ 0,00</div>
        </div>
        <button onclick="sendWhatsApp()" class="bg-green-600 text-white px-8 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg">
            Finalizar <i class="fab fa-whatsapp"></i>
        </button>
    </footer>

    <script>
        // BANCO DE DADOS INICIAL
        let SABORES = [
            { id: 1, nome: "01 Americana", preco: 36.00, desc: "molho, carne de sol, frango, cebola caramelizada, muçarela e orégano", img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" },
            { id: 2, nome: "02 Atum", preco: 31.00, desc: "molho, atum, cebola, muçarela e orégano", img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" },
            { id: 3, nome: "03 Bacon", preco: 33.00, desc: "molho, bacon, muçarela e orégano", img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" },
            { id: 4, nome: "04 Bacon 2", preco: 37.00, desc: "molho, mussarela, bacon, tomate, catupiry original", img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" }
        ];

        let BEBIDAS = [
            { id: 101, nome: "Coca-Cola 2L", preco: 14.00, img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" },
            { id: 102, nome: "Suco Lata", preco: 6.00, img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" }
        ];

        let BORDAS = [
            { nome: "Cheddar", preco: 7.00 },
            { nome: "Catupiry Original", preco: 9.00 }
        ];

        let cart = [];
        let curItem = { type: '', size: '', flavors: [], border: null };

        // --- RENDERIZAR CARDÁPIO ---
        function renderMenu() {
            const container = document.getElementById('menu-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = "";

            // Seção Pizzas (Renderiza por Tamanho conforme sua foto 2)
            const tamanhos = ['P', 'M', 'G', 'GG'];
            tamanhos.forEach(t => {
                container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center group active:scale-95 transition-all cursor-pointer" onclick="openModal('pizza', '${t}')">
                        <img src="${SABORES[0].img}" class="w-24 h-24 rounded-2xl object-cover shadow-md">
                        <div class="flex-1 text-left">
                            <h3 class="font-bold text-stone-800">PIZZA (${t})</h3>
                            <p class="text-xs text-stone-400 mt-1">Ver Sabores e Valores</p>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-green-600 font-bold">$</span>
                                <div class="bg-green-500 text-white p-2 rounded-xl text-xs shadow-lg"><i class="fa fa-shopping-cart"></i></div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Seção Bebidas
            const filteredBebidas = BEBIDAS.filter(b => b.nome.toLowerCase().includes(search));
            filteredBebidas.forEach(b => {
                container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                        <img src="${b.img}" class="w-24 h-24 rounded-2xl object-cover shadow-md">
                        <div class="flex-1 text-left">
                            <h3 class="font-bold text-stone-800">${b.nome}</h3>
                            <span class="text-green-600 font-bold text-lg">R$ ${b.preco.toFixed(2)}</span>
                            <button onclick="addDirect(${b.id})" class="mt-2 w-full bg-stone-900 text-white py-2 rounded-xl text-xs font-bold">Adicionar</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- MODAL DE SABORES ---
        function openModal(type, size) {
            curItem = { type, size, flavors: [], border: null };
            document.getElementById('modal-title').innerText = `PIZZA (${size})`;
            document.getElementById('pizza-modal').classList.remove('hidden');
            renderSaboresModal();
            renderBordasModal();
            updateModalPrice();
        }

        function renderSaboresModal() {
            const container = document.getElementById('sabores-container');
            container.innerHTML = SABORES.map(s => `
                <div class="bg-stone-50 p-3 rounded-2xl border border-stone-100">
                    <div class="flex items-center justify-between mb-2">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" onchange="toggleSabor(${s.id})" ${curItem.flavors.find(x => x.id === s.id) ? 'checked' : ''} class="w-5 h-5 accent-green-600">
                            <span class="font-bold text-stone-700">${s.nome}</span>
                        </label>
                        <span class="font-bold text-stone-600 text-sm">R$ ${s.preco.toFixed(2)}</span>
                    </div>
                    <p class="text-[11px] text-stone-400 bg-white/50 p-2 rounded-lg">${s.desc}</p>
                </div>
            `).join('');
        }

        function toggleSabor(id) {
            const index = curItem.flavors.findIndex(x => x.id === id);
            if(index > -1) {
                curItem.flavors.splice(index, 1);
            } else {
                if(curItem.flavors.length >= 2) { renderSaboresModal(); return alert("Máximo 2 sabores!"); }
                curItem.flavors.push(SABORES.find(x => x.id === id));
            }
            updateModalPrice();
        }

        function renderBordasModal() {
            const container = document.getElementById('bordas-container');
            container.innerHTML = BORDAS.map(b => `
                <label class="flex justify-between items-center p-2 cursor-pointer hover:bg-white rounded-xl transition-all">
                    <div class="flex items-center gap-3">
                        <input type="radio" name="borda" onchange="setBorda('${b.nome}')" class="w-4 h-4 accent-green-600">
                        <span class="text-xs font-semibold uppercase text-stone-600">${b.nome}</span>
                    </div>
                    <span class="text-xs font-bold">+ R$ ${b.preco.toFixed(2)}</span>
                </label>
            `).join('');
        }

        function setBorda(nome) {
            curItem.border = BORDAS.find(b => b.nome === nome);
            updateModalPrice();
        }

        function updateModalPrice() {
            let total = 0;
            if(curItem.flavors.length > 0) {
                // Lógica de Meio a Meio: Pega o preço da mais cara
                total = Math.max(...curItem.flavors.map(s => s.preco));
            }
            if(curItem.border) total += curItem.border.preco;
            document.getElementById('modal-price-display').innerText = `R$ ${total.toFixed(2)}`;
        }

        // --- SISTEMA DE CARRINHO ---
        function addToCart() {
            if(curItem.flavors.length === 0) return alert("Escolha pelo menos 1 sabor!");
            
            const nomes = curItem.flavors.map(s => s.nome).join(' / ');
            const precoFinal = Math.max(...curItem.flavors.map(s => s.preco)) + (curItem.border ? curItem.border.preco : 0);

            cart.push({
                name: `Pizza (${curItem.size}) - ${nomes}`,
                price: precoFinal,
                obs: document.getElementById('item-obs').value,
                extra: curItem.border ? `Borda: ${curItem.border.nome}` : 'Sem borda'
            });

            closeModal();
            updateCartTotal();
        }

        function addDirect(id) {
            const item = BEBIDAS.find(b => b.id === id);
            cart.push({ name: item.nome, price: item.preco, extra: '', obs: '' });
            updateCartTotal();
            alert(`${item.nome} adicionado!`);
        }

        function updateCartTotal() {
            const total = cart.reduce((acc, curr) => acc + curr.price, 0);
            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
        }

        function closeModal() { document.getElementById('pizza-modal').classList.add('hidden'); }

        // --- PAINEL ADMIN ---
        function openAdmin() {
            const pass = prompt("Senha Administrativa:");
            if(pass !== "1234") return alert("Acesso Negado!");
            
            document.getElementById('admin-modal').classList.remove('hidden');
            renderAdminFields();
        }

        function renderAdminFields() {
            const pizzaList = document.getElementById('admin-pizzas-list');
            pizzaList.innerHTML = SABORES.map((s, i) => `
                <div class="bg-stone-50 p-4 rounded-2xl border text-left space-y-2">
                    <p class="text-xs font-bold text-stone-400 uppercase">Sabor #${s.id}</p>
                    <input type="text" value="${s.nome}" onchange="updateSaborData(${i}, 'nome', this.value)" class="w-full p-2 rounded border" placeholder="Nome do Sabor">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" value="${s.preco}" onchange="updateSaborData(${i}, 'preco', this.value)" class="p-2 rounded border" placeholder="Preço">
                        <input type="text" value="${s.img}" onchange="updateSaborData(${i}, 'img', this.value)" class="p-2 rounded border" placeholder="URL da Imagem">
                    </div>
                </div>
            `).join('');

            const bebidaList = document.getElementById('admin-bebidas-list');
            bebidaList.innerHTML = BEBIDAS.map((b, i) => `
                <div class="bg-stone-50 p-4 rounded-2xl border text-left space-y-2">
                    <input type="text" value="${b.nome}" onchange="updateBebidaData(${i}, 'nome', this.value)" class="w-full p-2 rounded border" placeholder="Bebida">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" value="${b.preco}" onchange="updateBebidaData(${i}, 'preco', this.value)" class="p-2 rounded border" placeholder="Preço">
                        <input type="text" value="${b.img}" onchange="updateBebidaData(${i}, 'img', this.value)" class="p-2 rounded border" placeholder="Imagem">
                    </div>
                </div>
            `).join('');
        }

        function updateSaborData(index, field, value) { SABORES[index][field] = field === 'preco' ? parseFloat(value) : value; }
        function updateBebidaData(index, field, value) { BEBIDAS[index][field] = field === 'preco' ? parseFloat(value) : value; }

        function saveAdmin() {
            renderMenu();
            document.getElementById('admin-modal').classList.add('hidden');
            alert("Cardápio Atualizado com Sucesso!");
        }

        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

        function sendWhatsApp() {
            if(cart.length === 0) return alert("Carrinho vazio!");
            let texto = "*PEDIDO - PIZZARIA A PORTUGUESA*\n\n";
            cart.forEach(item => {
                texto += `🍕 *${item.name}*\n💰 R$ ${item.price.toFixed(2)}\n➕ ${item.extra}\n📝 ${item.obs}\n\n`;
            });
            const total = cart.reduce((acc, curr) => acc + curr.price, 0);
            texto += `*TOTAL: R$ ${total.toFixed(2)}*`;
            window.open(`https://api.whatsapp.com/send?phone=5588992791644&text=${encodeURIComponent(texto)}`);
        }

        // Início
        window.onload = renderMenu;
    </script>
</body>
</html>
