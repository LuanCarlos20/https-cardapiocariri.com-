<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }
        .animate-pulse-green { animation: pulse-green 2s infinite; }
        
        .payment-btn.active { 
            background-color: #c2410c !important; 
            color: white !important; 
            border-color: #c2410c !important; 
        }

        .price-green { color: #22c55e; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24 text-left">

    <header class="w-full h-[260px] bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-center p-4">
            <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" alt="Logo" class="w-20 h-20 rounded-full object-cover border-2 border-white shadow-xl mb-2">
            <h1 class="text-white text-2xl font-serif font-bold">Pizzaria A Portuguesa</h1>
            <div id="status-loja" class="mt-2 text-white px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2 bg-green-600 animate-pulse-green">
                <i class="fa fa-clock"></i> <span>Aberto Agora</span>
            </div>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-md z-40 overflow-x-auto whitespace-nowrap p-3 flex gap-3 scrollbar-hide">
        <button onclick="filterCategory('todas')" class="px-5 py-2 rounded-full bg-orange-700 text-white text-sm font-semibold shadow-sm">Todas</button>
        <button onclick="filterCategory('pizzas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Pizzas</button>
        <button onclick="filterCategory('esfirras')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Esfirras</button>
        <button onclick="filterCategory('bebidas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Bebidas</button>
    </nav>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 mt-2" id="menu-container"></main>

    <div id="product-modal" class="fixed inset-0 bg-black/70 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl max-h-[90vh] overflow-hidden flex flex-col relative">
            <div class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 id="modal-title" class="font-bold text-lg uppercase">ITEM</h2>
                <button onclick="closeModal()" class="bg-red-500 text-white w-8 h-8 rounded-md text-xl font-bold">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                <div id="modal-price" class="price-green">R$ 0,00</div>
                
                <div class="flex justify-between items-center border-b pb-1">
                    <span id="modal-subtitle" class="font-bold text-sm">Opções</span>
                    <span id="modal-limit" class="text-xs text-stone-500">Escolha os sabores</span>
                </div>

                <div id="options-list" class="space-y-1"></div>

                <div id="extra-section" class="hidden bg-stone-50 border rounded-xl p-4">
                    <p class="font-bold text-[10px] uppercase mb-3 tracking-widest text-stone-600">BORDAS RECHEADAS</p>
                    <div id="extra-list" class="space-y-3"></div>
                </div>

                <div class="text-left">
                    <label class="font-bold text-sm">Observação</label>
                    <textarea id="product-obs" class="w-full border rounded-xl p-3 mt-1 outline-none focus:ring-1 focus:ring-green-500" placeholder="Ex: Sem cebola, bem assada..."></textarea>
                </div>

                <div class="mt-4 text-left">
                    <p class="font-bold text-sm mb-2">Quantidade</p>
                    <div class="flex items-center">
                        <button onclick="updateQty(-1)" class="bg-red-500 text-white w-12 h-12 rounded-l-xl font-bold text-xl">-</button>
                        <div id="product-qty" class="flex-1 h-12 border-t border-b flex items-center justify-center font-bold text-lg">1</div>
                        <button onclick="updateQty(1)" class="bg-green-500 text-white w-12 h-12 rounded-r-xl font-bold text-xl">+</button>
                    </div>
                </div>
            </div>

            <div class="p-4 border-t bg-white">
                <button onclick="confirmItem()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl uppercase tracking-wider">
                    Adicionar ao Carrinho
                </button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-stone-200 p-4 flex items-center justify-between z-50">
        <div class="flex flex-col text-left">
            <span class="text-[10px] text-stone-500 uppercase font-bold tracking-widest">Total + Entrega</span>
            <span class="text-xl font-bold text-orange-800" id="cart-total">R$ 0,00</span>
        </div>
        <button onclick="toggleCart(true)" class="bg-orange-700 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg">Ver Pedido</button>
    </footer>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        const STORE_NAME = "Pizzaria A Portuguesa";

        // DADOS DO CARDÁPIO BASEADO NAS FOTOS
        const SABORES_PIZZA = [
            { id: 1, nome: "01 americana", preco: 36, desc: "molho, presunto, mussarela, ovos, bacon..." },
            { id: 2, nome: "02 atum", preco: 31, desc: "molho, atum ralado, cebola e orégano" },
            { id: 14, nome: "14 camarão", preco: 45, desc: "molho, mussarela, camarão e orégano" }
        ];

        const ESFIRRAS_SABORES = {
            'TRADICIONAIS': [
                { id: 48, nome: "48 bacon", preco: 7.00 },
                { id: 49, nome: "49 calabresa c/ mussarela", preco: 7.00 },
                { id: 56, nome: "56 mussarela", preco: 6.00 }
            ],
            'ESPECIAIS': [
                { id: 59, nome: "59 americana", preco: 9.00 },
                { id: 69, nome: "69 camarão", preco: 11.00 }
            ],
            'DOCES': [
                { id: 91, nome: "91 brigadeiro", preco: 9.00 },
                { id: 93, nome: "93 sensação", preco: 10.00 }
            ]
        };

        const BORDAS = [
            { nome: "Sem Borda", preco: 0 },
            { nome: "Cheddar", preco: 7 },
            { nome: "Catupiry", preco: 7 }
        ];

        let cart = [];
        let curItem = { type: '', title: '', options: [], extra: null, qty: 1, limit: 1 };

        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";

            // PIZZAS
            if(cat === 'todas' || cat === 'pizzas') {
                ['P', 'M', 'G', 'GG'].forEach(s => {
                    container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 text-left min-w-0">
                            <h3 class="font-bold text-sm uppercase">PIZZA (${s})</h3>
                            <button onclick="openModal('pizza', 'PIZZA (${s})', 2)" class="mt-4 w-full bg-green-500 text-white py-2 rounded-full font-bold text-xs">Escolher Sabores</button>
                        </div>
                    </div>`;
                });
            }

            // ESFIRRAS (Modelo igual ao das Pizzas)
            if(cat === 'todas' || cat === 'esfirras') {
                Object.keys(ESFIRRAS_SABORES).forEach(tipo => {
                    container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                        <img src="https://images.unsplash.com/photo-1628191139360-4083564d03fd?w=200" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 text-left min-w-0">
                            <h3 class="font-bold text-sm uppercase text-left">ESFIRRAS ${tipo}</h3>
                            <p class="text-[10px] text-stone-500 text-left">Escolha seus sabores preferidos!</p>
                            <button onclick="openModal('esfirra', '${tipo}', 10)" class="mt-4 w-full bg-green-500 text-white py-2 rounded-full font-bold text-xs text-center">Ver Valores</button>
                        </div>
                    </div>`;
                });
            }
        }

        function openModal(type, title, limit) {
            curItem = { type, title, options: [], extra: type === 'pizza' ? BORDAS[0] : null, qty: 1, limit };
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-limit').innerText = type === 'pizza' ? `Escolha até ${limit}` : `Mínimo: 1`;
            document.getElementById('product-qty').innerText = "1";
            document.getElementById('product-obs').value = "";
            
            renderOptions(type, title);
            
            const extraSec = document.getElementById('extra-section');
            if(type === 'pizza') {
                extraSec.classList.remove('hidden');
                renderExtras();
            } else {
                extraSec.classList.add('hidden');
            }

            updatePrice();
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function renderOptions(type, title) {
            const list = type === 'pizza' ? SABORES_PIZZA : ESFIRRAS_SABORES[title];
            document.getElementById('options-list').innerHTML = list.map(item => `
                <div class="flex items-center justify-between py-2 border-b border-stone-50 text-left">
                    <div class="flex items-center gap-3">
                        <input type="${type === 'pizza' ? 'checkbox' : 'checkbox'}" onchange="toggleOption(${item.id}, ${item.preco}, '${type}')" class="w-5 h-5 accent-green-600">
                        <div class="text-left"><p class="text-sm font-bold uppercase">${item.nome}</p></div>
                    </div>
                    <span class="text-sm font-bold">R$ ${item.preco.toFixed(2)}</span>
                </div>`).join('');
        }

        function toggleOption(id, preco, type) {
            const idx = curItem.options.findIndex(o => o.id === id);
            if(idx > -1) curItem.options.splice(idx, 1);
            else {
                if(type === 'pizza' && curItem.options.length >= curItem.limit) return alert("Limite de sabores atingido!");
                curItem.options.push({id, preco});
            }
            updatePrice();
        }

        function renderExtras() {
            document.getElementById('extra-list').innerHTML = BORDAS.map(b => `
                <div class="flex justify-between items-center text-left">
                    <div class="flex items-center gap-3">
                        <input type="radio" name="borda" onchange="setExtra('${b.nome}', ${b.preco})" ${curItem.extra.nome === b.nome ? 'checked' : ''} class="w-5 h-5 accent-green-600">
                        <span class="text-sm uppercase">${b.nome}</span>
                    </div>
                    <span class="text-sm font-bold">${b.preco === 0 ? 'Grátis' : 'R$ '+b.preco.toFixed(2)}</span>
                </div>`).join('');
        }

        function setExtra(nome, preco) { curItem.extra = {nome, preco}; updatePrice(); }
        function updateQty(v) { curItem.qty = Math.max(1, curItem.qty + v); document.getElementById('product-qty').innerText = curItem.qty; updatePrice(); }

        function updatePrice() {
            let base = 0;
            if(curItem.type === 'pizza') {
                base = curItem.options.length ? Math.max(...curItem.options.map(o => o.preco)) : 0;
                base += curItem.extra ? curItem.extra.preco : 0;
            } else {
                base = curItem.options.reduce((sum, o) => sum + o.preco, 0);
            }
            document.getElementById('modal-price').innerText = `R$ ${(base * curItem.qty).toFixed(2)}`;
        }

        function confirmItem() {
            if(!curItem.options.length) return alert("Selecione pelo menos um sabor!");
            
            // Lógica para salvar no carrinho simplificada
            cart.push({
                name: curItem.title,
                price: parseFloat(document.getElementById('modal-price').innerText.replace('R$ ', '')),
                qty: curItem.qty
            });
            closeModal();
            updateCartUI();
        }

        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }
        function filterCategory(c) { renderMenu(c); }

        function updateCartUI() {
            const subtotal = cart.reduce((a, c) => a + c.price, 0);
            document.getElementById('cart-total').innerText = `R$ ${subtotal.toFixed(2)}`;
        }

        renderMenu();
    </script>
</body>
</html>
