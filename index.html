<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }
        .animate-pulse-green { animation: pulse-green 2s infinite; }
        .payment-btn.active { background-color: #c2410c !important; color: white !important; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24 text-center">

    <header class="w-full h-[220px] bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center p-4">
            <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-20 h-20 rounded-full border-2 border-white mb-2">
            <h1 class="text-white text-2xl font-serif font-bold">Pizzaria A Portuguesa</h1>
            <div id="status-loja" class="mt-2 text-white px-4 py-1 rounded-full text-xs font-bold bg-green-600 animate-pulse-green">Aberto Agora</div>
        </div>
    </header>

    <section class="max-w-6xl mx-auto p-4">
        <div class="bg-orange-700 rounded-3xl p-6 text-white shadow-xl mb-6">
            <h2 class="text-xl font-serif font-bold mb-2">🍕 Monte sua Pizza Meio a Meio</h2>
            <p class="text-sm opacity-90 mb-4">Escolha os sabores e o tamanho ideal</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-stone-900">
                <select id="size-select" class="p-3 rounded-xl bg-white font-bold outline-none">
                    <option value="P" data-price="35">Tamanho P (4 fatias) - R$ 35,00</option>
                    <option value="M" data-price="45" selected>Tamanho M (6 fatias) - R$ 45,00</option>
                    <option value="G" data-price="55">Tamanho G (8 fatias) - R$ 55,00</option>
                </select>

                <select id="flavor1" class="p-3 rounded-xl bg-white outline-none">
                    <option value="Calabresa">Sabor 1: Calabresa</option>
                    <option value="Queijo">Sabor 1: Queijo</option>
                    <option value="Bacon">Sabor 1: Bacon</option>
                    <option value="Portuguesa">Sabor 1: Portuguesa</option>
                    <option value="Frango com Catupiry">Sabor 1: Frango c/ Catupiry</option>
                </select>

                <select id="flavor2" class="p-3 rounded-xl bg-white outline-none">
                    <option value="Mesmo Sabor">Sabor 2: (Inteira)</option>
                    <option value="Calabresa">Sabor 2: Calabresa</option>
                    <option value="Queijo">Sabor 2: Queijo</option>
                    <option value="Bacon">Sabor 2: Bacon</option>
                    <option value="Portuguesa">Sabor 2: Portuguesa</option>
                    <option value="Frango com Catupiry">Sabor 2: Frango c/ Catupiry</option>
                </select>
            </div>
            
            <button onclick="addCustomPizza()" class="w-full mt-4 bg-white text-orange-800 font-bold py-3 rounded-xl hover:bg-stone-100 transition shadow-lg">
                Adicionar Pizza Montada ao Pedido
            </button>
        </div>
    </section>

    <nav class="sticky top-0 bg-white shadow-md z-40 overflow-x-auto whitespace-nowrap p-3 flex gap-3 scrollbar-hide justify-center">
        <button onclick="filterCategory('todas')" class="px-5 py-2 rounded-full bg-orange-700 text-white text-sm font-semibold">Todas</button>
        <button onclick="filterCategory('esfirras')" class="px-5 py-2 rounded-full bg-stone-100 text-sm font-medium">Esfirras</button>
        <button onclick="filterCategory('bebidas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm font-medium">Bebidas</button>
    </nav>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="menu-container"></main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex items-center justify-between z-50">
        <div class="text-left">
            <span class="text-[10px] text-stone-500 uppercase font-bold tracking-widest">Total + Entrega</span>
            <span class="text-xl font-bold text-orange-800 block" id="cart-total">R$ 0,00</span>
        </div>
        <button onclick="toggleModal(true)" class="bg-orange-700 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg">Ver Pedido <i class="fa fa-shopping-basket ml-2"></i></button>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-stone-400 text-3xl">&times;</button>
            <h2 class="text-2xl font-serif font-bold mb-6 border-b pb-2">Meu Pedido</h2>
            <div id="cart-items" class="space-y-4 mb-6"></div>

            <div class="mb-6 bg-stone-50 p-4 rounded-2xl border text-sm text-left">
                <label class="font-bold block text-stone-700 mb-1">Bairro para Entrega:</label>
                <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-3 bg-white border">
                    <option value="0" data-fee="0">Selecione seu bairro...</option>
                    <option value="Centro" data-fee="3.00">Centro (R$ 3,00)</option>
                    <option value="Cirolândia" data-fee="3.50">Cirolândia (R$ 3,50)</option>
                    <option value="Malvinas" data-fee="4.00">Malvinas (R$ 4,00)</option>
                </select>
                <div class="flex justify-between font-bold text-lg text-orange-800 border-t pt-2 mt-2">
                    <span>Total Final:</span> <span id="summary-total">R$ 0,00</span>
                </div>
            </div>

            <div class="space-y-4">
                <p class="text-sm font-bold text-left">Pagamento:</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Pix</button>
                    <button onclick="setPayment('Cartao')" id="pay-Cartao" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Cartão</button>
                    <button onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border rounded-xl py-2 text-xs font-bold transition-all bg-white">Dinheiro</button>
                </div>
                <div id="troco-container" class="hidden"><input type="number" id="valor-troco" placeholder="Troco para quanto?" class="w-full border rounded-xl p-3"></div>
                <div id="cartao-container" class="hidden"><select id="tipo-cartao" class="w-full border rounded-xl p-3 bg-white"><option value="Débito">Débito</option><option value="Crédito">Crédito</option></select></div>
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full border rounded-xl p-3">
                <input type="text" id="cust-address" placeholder="Endereço Completo" class="w-full border rounded-xl p-3">
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl text-lg shadow-lg">Finalizar no WhatsApp <i class="fab fa-whatsapp ml-2"></i></button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        const STORE_NAME = "Pizzaria A Portuguesa";
        let cart = [];
        let paymentMethod = "";

        const EXTRA_PRODUCTS = [
            { id: 301, cat: 'esfirras', name: "Esfirra de Carne", price: 6.00, desc: "Massa fofinha.", img: "https://images.unsplash.com/photo-1628191139360-4083564d03fd?w=200" },
            { id: 302, cat: 'esfirras', name: "Esfirra de Frango", price: 6.00, desc: "Frango bem temperado.", img: "https://images.unsplash.com/photo-1628191139360-4083564d03fd?w=200" },
            { id: 401, cat: 'bebidas', name: "Coca-Cola 2L", price: 12.00, desc: "Gelada.", img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" },
            { id: 402, cat: 'bebidas', name: "Guaraná 2L", price: 10.00, desc: "Gelada.", img: "https://matafoomi.com.br/images/item/180b57d13db78068761719a85d248ccd871cef05.webp" }
        ];

        function addCustomPizza() {
            const sizeSelect = document.getElementById('size-select');
            const size = sizeSelect.value;
            const price = parseFloat(sizeSelect.options[sizeSelect.selectedIndex].getAttribute('data-price'));
            const f1 = document.getElementById('flavor1').value;
            const f2 = document.getElementById('flavor2').value;

            const name = f2 === "Mesmo Sabor" ? `Pizza ${f1} (${size})` : `Pizza Meio ${f1} / Meio ${f2} (${size})`;
            
            cart.push({ id: Date.now(), cat: 'pizzas', name: name, price: price, extra: "Sem Borda Recheada", extraPrice: 0 });
            updateCartUI();
            alert("Pizza adicionada ao carrinho!");
        }

        function renderMenu(items = EXTRA_PRODUCTS) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                    <img src="${p.img}" class="w-20 h-20 rounded-xl object-cover">
                    <div class="flex-1 text-left">
                        <div class="flex justify-between items-start"><h3 class="font-bold text-sm">${p.name}</h3><span class="text-orange-700 font-bold text-sm">R$ ${p.price.toFixed(2)}</span></div>
                        <p class="text-[10px] text-stone-500 mb-2">${p.desc}</p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-stone-900 text-white py-2 rounded-xl text-xs font-bold hover:bg-orange-700 transition">Adicionar</button>
                    </div>
                </div>`).join('');
        }

        function addToCart(id) {
            const p = EXTRA_PRODUCTS.find(x => x.id === id);
            cart.push({...p, extra: "", extraPrice: 0});
            updateCartUI();
        }

        function filterCategory(cat) { renderMenu(cat === 'todas' ? EXTRA_PRODUCTS : EXTRA_PRODUCTS.filter(p => p.cat === cat)); }
        function toggleModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }

        function setPayment(m) { 
            paymentMethod = m; 
            document.querySelectorAll('.payment-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`pay-${m}`).classList.add('active'); 
            document.getElementById('troco-container').classList.toggle('hidden', m !== 'Dinheiro');
            document.getElementById('cartao-container').classList.toggle('hidden', m !== 'Cartao');
        }

        function setExtra(index, type) {
            const prices = { 'nenhum': 0, 'catupiry': 2.00, 'cheddar': 3.00 };
            const names = { 'nenhum': 'Sem Borda Recheada', 'catupiry': 'Borda Catupiry', 'cheddar': 'Borda Cheddar' };
            cart[index].extra = names[type];
            cart[index].extraPrice = prices[type];
            updateCartUI();
        }

        function updateCartUI() {
            const d = document.getElementById('delivery-location');
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee') || 0);
            const subtotal = cart.reduce((a, c) => a + c.price + (c.extraPrice || 0), 0);
            document.getElementById('cart-total').innerText = `R$ ${(subtotal + fee).toFixed(2)}`;
            document.getElementById('summary-total').innerText = `R$ ${(subtotal + fee).toFixed(2)}`;
            
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="bg-stone-50 p-3 rounded-xl border text-left">
                    <div class="flex justify-between items-center">
                        <p class="font-bold text-sm">${item.name}</p>
                        <button onclick="cart.splice(${i}, 1); updateCartUI();" class="text-red-500 text-xs"><i class="fa fa-trash"></i></button>
                    </div>
                    <p class="text-xs text-orange-700 font-bold">R$ ${(item.price + item.extraPrice).toFixed(2)}</p>
                    ${item.cat === 'pizzas' ? `
                    <div class="flex gap-1 mt-2">
                        <button onclick="setExtra(${i}, 'nenhum')" class="flex-1 text-[9px] border py-1 rounded-md ${item.extraPrice === 0 ? 'bg-orange-700 text-white' : 'bg-white'}">Sem Borda</button>
                        <button onclick="setExtra(${i}, 'catupiry')" class="flex-1 text-[9px] border py-1 rounded-md ${item.extra === 'Borda Catupiry' ? 'bg-orange-700 text-white' : 'bg-white'}">Catupiry (+2)</button>
                        <button onclick="setExtra(${i}, 'cheddar')" class="flex-1 text-[9px] border py-1 rounded-md ${item.extra === 'Borda Cheddar' ? 'bg-orange-700 text-white' : 'bg-white'}">Cheddar (+3)</button>
                    </div>` : ''}
                </div>`).join('');
        }

        function sendOrder() {
            const d = document.getElementById('delivery-location'), n = document.getElementById('cust-name').value, a = document.getElementById('cust-address').value;
            if(!cart.length || d.value === "0" || !paymentMethod || !n) return alert("Preencha todos os dados!");
            
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee'));
            let msg = `*PEDIDO - ${STORE_NAME}*\n\n👤 *Cliente:* ${n}\n📍 *Endereço:* ${a}\n🏘️ *Bairro:* ${d.value}\n💳 *Pagamento:* ${paymentMethod}${paymentMethod === 'Dinheiro' ? ' (Troco para R$ '+document.getElementById('valor-troco').value+')' : ''}\n\n🛒 *ITENS:*\n`;
            
            cart.forEach(i => {
                msg += `• ${i.name} (R$ ${i.price.toFixed(2)})\n`;
                if(i.extraPrice > 0) msg += `  └ _${i.extra}_ (+R$${i.extraPrice.toFixed(2)})\n`;
            });

            msg += `\n*Entrega:* R$ ${fee.toFixed(2)}\n*TOTAL: R$ ${(cart.reduce((a,c)=>a+c.price+c.extraPrice,0)+fee).toFixed(2)}*\n\n⏱️ *Preparo:* 30 a 50 min`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        renderMenu();
    </script>
</body>
</html>
