<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        /* Animações de Piscar (Pulse) */
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); border-color: #16a34a; }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); border-color: #16a34a; }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); border-color: #16a34a; }
        }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); border-color: #dc2626; }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); border-color: #dc2626; }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); border-color: #dc2626; }
        }

        /* Classes de aplicação das animações */
        .status-open { animation: pulse-green 2s infinite; background-color: #16a34a; }
        .status-closed { animation: pulse-red 2s infinite; background-color: #dc2626; }
        
        .logo-open { border: 3px solid #16a34a; animation: pulse-green 2s infinite; }
        .logo-closed { border: 3px solid #dc2626; animation: pulse-red 2s infinite; }

        .payment-btn.active { 
            background-color: #c2410c !important; 
            color: white !important; 
            border-color: #c2410c !important; 
        }

        .price-green { color: #22c55e; font-size: 1.5rem; font-weight: bold; }
        .border-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 12px; padding: 15px; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24">

    <header class="w-full h-[280px] bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        
        <div class="absolute top-4 left-4 flex gap-2 z-10">
            <a href="https://www.instagram.com/pizzaria_a_portuguesa/" target="_blank" class="bg-white/20 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md hover:bg-white/40 transition-all shadow-lg border border-white/30">
                <i class="fab fa-instagram text-xl"></i>
            </a>
            <a href="https://maps.google.com" target="_blank" class="bg-white/20 text-white w-10 h-10 rounded-full flex items-center justify-center backdrop-blur-md hover:bg-white/40 transition-all shadow-lg border border-white/30">
                <i class="fas fa-map-marker-alt text-xl"></i>
            </a>
        </div>

        <button onclick="shareMenu()" class="absolute top-4 right-4 bg-green-600 text-white px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-green-700 transition-all z-10 shadow-lg">
            <i class="fab fa-whatsapp text-sm"></i> Compartilhar
        </button>

        <div class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center text-center p-4">
            <img id="logo-pizzaria" src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" 
                 alt="Logo" class="w-24 h-24 rounded-full object-cover shadow-2xl mb-3 transition-all duration-500">
            
            <h1 class="text-white text-3xl font-serif font-bold drop-shadow-md">Pizzaria A Portuguesa</h1>
            
            <div id="status-loja" class="mt-3 text-white px-5 py-2 rounded-full text-xs font-bold flex items-center gap-2 shadow-lg transition-all">
                <i class="fa fa-clock"></i> <span id="status-texto">Verificando...</span>
            </div>
            
            <p class="text-white/90 text-[11px] mt-3 font-medium tracking-wide bg-black/20 px-3 py-1 rounded-full backdrop-blur-sm">
                Dom a Seg: 16h às 00h • <span class="text-red-300 font-bold">Terça: Fechado</span>
            </p>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-md z-40 overflow-x-auto whitespace-nowrap p-3 flex gap-3 scrollbar-hide">
        <button onclick="filterCategory('todas')" class="px-6 py-2.5 rounded-full bg-orange-700 text-white text-sm font-semibold shadow-sm">Todas</button>
        <button onclick="filterCategory('pizzas')" class="px-6 py-2.5 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Pizzas</button>
        <button onclick="filterCategory('esfirras')" class="px-6 py-2.5 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Esfirras</button>
        <button onclick="filterCategory('bebidas')" class="px-6 py-2.5 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Bebidas</button>
    </nav>

    <div class="max-w-6xl mx-auto px-4 mt-4 relative z-0">
        <div class="relative">
            <input type="text" id="search-input" oninput="searchProduct()" placeholder="O que vamos pedir hoje?" 
                   class="w-full bg-white border border-stone-200 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-orange-500 transition-all shadow-sm">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 mt-2" id="menu-container"></main>

    <div id="pizza-modal" class="fixed inset-0 bg-black/70 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-hidden flex flex-col relative">
            <div class="p-5 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 id="modal-pizza-title" class="font-bold text-lg uppercase">ITEM</h2>
                <button onclick="closePizzaModal()" class="bg-stone-100 text-stone-500 w-10 h-10 rounded-full text-2xl font-light hover:bg-red-50 transition-colors">×</button>
            </div>
            <div class="flex-1 overflow-y-auto p-5 space-y-5 scrollbar-hide">
                <div id="modal-pizza-price" class="price-green">R$ 0,00</div>
                <div class="flex justify-between items-center border-b pb-2">
                    <span class="font-bold text-sm">Escolha os Sabores</span>
                    <span id="flavor-limit-text" class="text-xs text-stone-400 font-medium">Escolha até 2</span>
                </div>
                <div id="sabores-lista" class="space-y-2"></div>
                <div id="borda-container" class="border-box">
                    <p class="font-bold text-[10px] uppercase mb-4 tracking-widest text-stone-500">BORDAS RECHEADAS</p>
                    <div id="bordas-lista" class="space-y-4"></div>
                </div>
                <div class="space-y-2">
                    <label class="font-bold text-sm">Observação</label>
                    <textarea id="pizza-obs" class="w-full border border-stone-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-orange-500 transition-all h-24" placeholder="Ex: Sem cebola, massa bem assada..."></textarea>
                </div>
                <div id="qty-container-global">
                    <p class="font-bold text-sm mb-3">Quantidade de Pizzas</p>
                    <div class="flex items-center">
                        <button onclick="updateQty(-1)" class="bg-stone-100 text-stone-800 w-14 h-14 rounded-l-2xl font-bold text-xl hover:bg-stone-200">-</button>
                        <div id="pizza-qty" class="flex-1 h-14 border-y border-stone-100 flex items-center justify-center font-bold text-xl">1</div>
                        <button onclick="updateQty(1)" class="bg-stone-100 text-stone-800 w-14 h-14 rounded-r-2xl font-bold text-xl hover:bg-stone-200">+</button>
                    </div>
                </div>
            </div>
            <div class="p-5 border-t bg-white">
                <button onclick="confirmItem()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl uppercase tracking-wider transition-all shadow-lg">
                    Adicionar ao Carrinho
                </button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-stone-200 p-4 flex items-center justify-between z-50">
        <div class="flex flex-col">
            <span class="text-[10px] text-stone-500 uppercase font-bold tracking-widest">Total do Pedido</span>
            <span class="text-2xl font-bold text-orange-800" id="cart-total">R$ 0,00</span>
        </div>
        <button onclick="toggleModal(true)" class="bg-orange-700 hover:bg-orange-800 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 transition-all shadow-xl">
            Ver Sacola <i class="fa fa-shopping-basket"></i>
        </button>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-stone-300 text-4xl font-light hover:text-stone-500 transition-colors">×</button>
            <h2 class="text-2xl font-serif font-bold mb-6 border-b pb-4 text-stone-800">Finalizar Pedido</h2>
            <div id="cart-items" class="space-y-4 mb-6"></div>
            
            <div class="mb-6 bg-stone-50 p-5 rounded-2xl border border-stone-100 space-y-4">
                <div>
                    <label class="font-bold text-xs uppercase text-stone-500 mb-2 block">Onde você está?</label>
                    <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-3 bg-white border border-stone-200">
                        <option value="0" data-fee="0">Selecione seu bairro...</option>
                        <option value="Centro" data-fee="3.00">Centro (R$ 3,00)</option>
                        <option value="Cirolândia" data-fee="3.50">Cirolândia (R$ 3,50)</option>
                        <option value="Malvinas" data-fee="4.00">Malvinas (R$ 4,00)</option>
                        <option value="Outros" data-fee="6.00">Outros (R$ 6,00)</option>
                    </select>
                </div>
                <div class="flex justify-between font-bold text-lg text-orange-900 border-t pt-3">
                    <span>Total Final:</span> <span id="summary-total">R$ 0,00</span>
                </div>
            </div>

            <div class="space-y-4">
                <p class="text-sm font-bold text-stone-700">Forma de Pagamento:</p>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border border-stone-200 rounded-xl py-3 text-xs font-bold transition-all bg-white hover:border-orange-500">Pix</button>
                    <button type="button" onclick="setPayment('Cartao')" id="pay-Cartao" class="payment-btn border border-stone-200 rounded-xl py-3 text-xs font-bold transition-all bg-white hover:border-orange-500">Cartão</button>
                    <button type="button" onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border border-stone-200 rounded-xl py-3 text-xs font-bold transition-all bg-white hover:border-orange-500">Dinheiro</button>
                </div>
                
                <div id="troco-container" class="hidden animate-fade-in">
                    <input type="number" id="valor-troco" placeholder="Troco para quanto?" class="w-full border border-stone-200 rounded-xl p-4 outline-orange-500 bg-orange-50/30">
                </div>
                
                <div id="cartao-container" class="hidden animate-fade-in">
                    <select id="tipo-cartao" class="w-full border border-stone-200 rounded-xl p-4 bg-orange-50/30 outline-orange-500">
                        <option value="Débito">Vou pagar no Débito</option>
                        <option value="Crédito">Vou pagar no Crédito</option>
                    </select>
                </div>

                <input type="text" id="cust-name" placeholder="Seu Nome Completo" class="w-full border border-stone-200 rounded-xl p-4 outline-orange-500">
                <input type="text" id="cust-address" placeholder="Rua, Número e Referência" class="w-full border border-stone-200 rounded-xl p-4 outline-orange-500">
                
                <button onclick="sendOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-5 rounded-2xl text-lg shadow-xl transition-all mt-4 flex items-center justify-center gap-2">
                    Enviar Pedido via WhatsApp <i class="fab fa-whatsapp"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        const STORE_NAME = "Pizzaria A Portuguesa";
        
        const SABORES_PIZZA = [
            { id: 1, nome: "01 americana", preco: 36, desc: "molho, presunto, mussarela, ovos, bacon e orégano" },
            { id: 2, nome: "02 atum", preco: 31, desc: "molho, atum ralado, cebola e orégano" },
            { id: 3, nome: "03 bacon", preco: 33, desc: "molho, mussarela, bacon e orégano" },
            { id: 10, nome: "10 calabresa com mussarela", preco: 33, desc: "molho, mussarela, calabresa e orégano" }
        ];

        const ESFIRRAS = {
            "Tradicionais (R$ 6,00)": [
                { id: 101, nome: "Carne", preco: 6 },
                { id: 102, nome: "Queijo", preco: 6 },
                { id: 103, nome: "Frango", preco: 6 }
            ],
            "Especiais (R$ 7,50)": [
                { id: 201, nome: "Carne com Queijo", preco: 7.5 },
                { id: 202, nome: "Frango com Catupiry", preco: 7.5 },
                { id: 203, nome: "Calabresa com Queijo", preco: 7.5 }
            ]
        };

        const BORDAS = [
            { nome: "cheddar", preco: 7 },
            { nome: "catupiry", preco: 7 },
            { nome: "catupiry original", preco: 9 },
            { nome: "chocolate", preco: 8 }
        ];

        let cart = [];
        let curItem = { type: '', size: '', selectedFlavors: {}, border: null, qty: 1 };
        let paymentMethod = "";

        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";

            if(cat === 'todas' || cat === 'pizzas') {
                ['P', 'M', 'G', 'GG'].forEach(s => {
                    container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-stone-100 flex gap-4 items-center">
                        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" class="w-20 h-20 rounded-2xl object-cover">
                        <div class="flex-1 text-left min-w-0">
                            <h3 class="font-bold text-base uppercase">PIZZA (${s})</h3>
                            <p class="text-[11px] text-stone-400">Monte com até 2 sabores</p>
                            <button onclick="openModal('pizza', '${s}')" class="mt-3 w-full bg-stone-900 text-white py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider hover:bg-orange-700 transition">
                                Personalizar
                            </button>
                        </div>
                    </div>`;
                });
            }

            if(cat === 'todas' || cat === 'esfirras') {
                container.innerHTML += `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-stone-100 flex gap-4 items-center">
                    <img src="https://images.unsplash.com/photo-1628191139360-4083564d03fd?w=200" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1 text-left min-w-0">
                        <h3 class="font-bold text-base uppercase">ESFIRRAS</h3>
                        <p class="text-[11px] text-stone-400">Tradicionais e Especiais</p>
                        <button onclick="openModal('esfirra')" class="mt-3 w-full bg-orange-700 text-white py-2 rounded-xl font-bold text-[10px] uppercase tracking-wider">
                            Escolher Sabores
                        </button>
                    </div>
                </div>`;
            }
        }

        function openModal(type, size = '') {
            curItem = { type, size, selectedFlavors: {}, border: null, qty: 1 };
            document.getElementById('modal-pizza-title').innerText = type === 'pizza' ? `PIZZA (${size})` : `ESFIRRAS`;
            document.getElementById('borda-container').classList.toggle('hidden', type !== 'pizza');
            document.getElementById('qty-container-global').classList.toggle('hidden', type !== 'pizza');
            document.getElementById('pizza-qty').innerText = "1";
            renderSaboresModal();
            if(type === 'pizza') renderBordas();
            updateModalPrice();
            document.getElementById('pizza-modal').classList.remove('hidden');
        }

        function renderSaboresModal() {
            const container = document.getElementById('sabores-lista');
            container.innerHTML = "";
            if(curItem.type === 'pizza') {
                container.innerHTML = SABORES_PIZZA.map(s => `
                    <div class="flex items-center justify-between py-3 border-b border-stone-50">
                        <div class="flex items-center gap-4">
                            <input type="checkbox" onchange="togglePizzaSabor(${s.id})" ${curItem.selectedFlavors[s.id] ? 'checked' : ''} class="w-6 h-6 rounded-md accent-green-600">
                            <div class="text-left"><p class="text-sm font-bold uppercase leading-none mb-1">${s.nome}</p><p class="text-[10px] text-stone-400">${s.desc}</p></div>
                        </div>
                        <span class="text-xs font-bold text-stone-600">R$ ${s.preco.toFixed(2)}</span>
                    </div>`).join('');
            } else {
                for(let cat in ESFIRRAS) {
                    container.innerHTML += `<div class="bg-stone-50 p-2 font-bold text-[10px] uppercase mt-4 rounded-lg text-stone-400 tracking-widest">${cat}</div>`;
                    container.innerHTML += ESFIRRAS[cat].map(s => `
                        <div class="flex items-center justify-between py-4 border-b border-stone-50">
                            <div class="text-left"><p class="text-sm font-bold uppercase">${s.nome}</p><p class="text-xs text-green-600 font-bold">R$ ${s.preco.toFixed(2)}</p></div>
                            <div class="flex items-center gap-3">
                                <button onclick="updateEsfirraQty(${s.id}, -1, ${s.preco}, '${s.nome}')" class="w-8 h-8 bg-stone-100 rounded-full font-bold">-</button>
                                <span id="esfirra-qty-${s.id}" class="w-4 text-center font-bold text-sm">${curItem.selectedFlavors[s.id]?.qty || 0}</span>
                                <button onclick="updateEsfirraQty(${s.id}, 1, ${s.preco}, '${s.nome}')" class="w-8 h-8 bg-stone-900 text-white rounded-full font-bold">+</button>
                            </div>
                        </div>`).join('');
                }
            }
        }

        function togglePizzaSabor(id) {
            if(curItem.
