<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web IPTV Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .header-info {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-menu {
            border-radius: 15px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
            border: none;
            text-decoration: none;
            color: white;
        }
        .card-menu:hover {
            transform: scale(1.05);
            color: #fff;
        }
        .bg-live { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .bg-movies { background: linear-gradient(135deg, #f80759, #bc4e9c); }
        .bg-series { background: linear-gradient(135deg, #7b4397, #dc2430); }
        
        #player-container {
            display: none;
            margin-top: 20px;
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
        }
        .channel-list {
            max-height: 400px;
            overflow-y: auto;
            background: #161b22;
            border-radius: 10px;
        }
        .list-group-item {
            background: transparent;
            color: white;
            border-color: #30363d;
            cursor: pointer;
        }
        .list-group-item:hover {
            background: #21262d;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">
        <div>
            <h2 class="mb-0">SMART PLAYER <span class="badge bg-primary">Web</span></h2>
            <small id="current-date"></small>
        </div>
        <div class="text-end">
            <input type="text" id="m3u-url" class="form-control form-control-sm mb-2" placeholder="URL da Lista .m3u">
            <button onclick="loadPlaylist()" class="btn btn-sm btn-outline-light">Carregar Lista</button>
        </div>
    </div>

    <div class="row g-4 mt-2" id="main-menu">
        <div class="col-md-4">
            <div class="card-menu bg-live" onclick="showCategory('Live')">
                <h1 style="font-size: 4rem;">📺</h1>
                <h3>LIVE TV</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-menu bg-movies" onclick="showCategory('Movies')">
                <h1 style="font-size: 4rem;">🎬</h1>
                <h3>MOVIES</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-menu bg-series" onclick="showCategory('Series')">
                <h1 style="font-size: 4rem;">🎞️</h1>
                <h3>SERIES</h3>
            </div>
        </div>
    </div>

    <div id="player-container" class="row">
        <div class="col-md-8">
            <video id="video" controls></video>
            <h4 id="now-playing" class="mt-2"></h4>
            <button class="btn btn-secondary btn-sm" onclick="backToMenu()">⬅ Voltar ao Menu</button>
        </div>
        <div class="col-md-4">
            <h5>Canais / Conteúdo</h5>
            <div class="list-group channel-list" id="playlist-items">
                </div>
        </div>
    </div>
</div>

<script>
    // Atualiza a data como na imagem
    document.getElementById('current-date').innerText = new Date().toLocaleString();

    let channels = [];
    const video = document.getElementById('video');
    const hls = new Hls();

    async function loadPlaylist() {
        const url = document.getElementById('m3u-url').value;
        if (!url) return alert("Insira a URL da lista!");

        try {
            const response = await fetch(url);
            const data = await response.text();
            parseM3U(data);
            alert("Lista carregada com sucesso!");
        } catch (err) {
            alert("Erro ao carregar lista. Verifique o CORS ou a URL.");
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        channels = [];
        let currentChannel = {};

        lines.forEach(line => {
            if (line.startsWith('#EXTINF:')) {
                const name = line.split(',')[1];
                currentChannel = { name: name.trim() };
            } else if (line.startsWith('http')) {
                currentChannel.url = line.trim();
                channels.push(currentChannel);
            }
        });
    }

    function showCategory(cat) {
        if (channels.length === 0) {
            alert("Carregue uma lista primeiro no canto superior direito!");
            return;
        }
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('player-container').style.display = 'flex';
        renderList();
    }

    function renderList() {
        const listContainer = document.getElementById('playlist-items');
        listContainer.innerHTML = '';
        
        channels.forEach(ch => {
            const item = document.createElement('a');
            item.className = 'list-group-item list-group-item-action';
            item.innerText = ch.name;
            item.onclick = () => playStream(ch.url, ch.name);
            listContainer.appendChild(item);
        });
    }

    function playStream(url, name) {
        document.getElementById('now-playing').innerText = "Assistindo: " + name;
        if (Hls.isSupported()) {
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    }

    function backToMenu() {
        document.getElementById('main-menu').style.display = 'flex';
        document.getElementById('player-container').style.display = 'none';
        video.pause();
    }
</script>

</body>
</html>
