<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0a0e14; color: white; font-family: sans-serif; }
        .card-menu {
            border-radius: 15px; height: 200px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer; transition: 0.3s;
            margin-bottom: 20px; border: none;
        }
        .card-menu:hover { transform: scale(1.03); filter: brightness(1.2); }
        .bg-live { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .bg-movies { background: linear-gradient(135deg, #f12711, #f5af19); }
        .bg-series { background: linear-gradient(135deg, #654ea3, #eaafc8); }
        
        #player-screen { display: none; padding: 20px; }
        video { width: 100%; background: #000; border-radius: 8px; aspect-ratio: 16/9; }
        
        .list-group { max-height: 60vh; overflow-y: auto; background: #161b22; }
        .list-group-item { background: transparent; color: white; border-color: #30363d; cursor: pointer; }
        .list-group-item:hover { background: #21262d; }
        
        .error-msg { color: #ff6b6b; padding: 10px; border: 1px solid #ff6b6b; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items: center mb-4">
        <h2>Smarters Web <small style="font-size: 12px; color: #888;">v2.0</small></h2>
        <div id="timer"></div>
    </div>

    <div id="setup-helper" class="error-msg mb-4">
        <strong>Atenção:</strong> A lista não pôde ser carregada. <br>
        1. Certifique-se de que está usando a extensão <b>"Allow CORS"</b> no navegador.<br>
        2. Se estiver no Chrome, clique no ícone do cadeado (ao lado da URL) e permita "Conteúdo Inseguro".
    </div>

    <div id="main-menu" class="row text-center">
        <div class="col-md-4" onclick="toggleView('LIVE')">
            <div class="card-menu bg-live"><h3>📺 LIVE TV</h3></div>
        </div>
        <div class="col-md-4" onclick="toggleView('MOVIES')">
            <div class="card-menu bg-movies"><h3>🎬 FILMES</h3></div>
        </div>
        <div class="col-md-4" onclick="toggleView('SERIES')">
            <div class="card-menu bg-series"><h3>🎞️ SÉRIES</h3></div>
        </div>
        <p id="load-status">Carregando canais...</p>
    </div>

    <div id="player-screen">
        <button class="btn btn-sm btn-secondary mb-3" onclick="backToMenu()">⬅ Voltar</button>
        <div class="row">
            <div class="col-lg-8">
                <video id="main-video" controls autoplay></video>
                <h4 id="video-title" class="mt-2"></h4>
            </div>
            <div class="col-lg-4">
                <input type="text" id="search" class="form-control mb-2" placeholder="Buscar canal..." onkeyup="filterChannels()">
                <div class="list-group" id="channel-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const URL_LISTA = "http://iptvperfeito.ddns.net:25461/get.php?username=197388121&password=197388121&type=m3u_plus&output=ts";
    let canais = [];
    const video = document.getElementById('main-video');
    let hls = new Hls();

    // 1. Buscar a lista
    async function carregarLista() {
        try {
            const res = await fetch(URL_LISTA);
            if (!res.ok) throw new Error();
            const text = await res.text();
            parsearM3U(text);
            document.getElementById('load-status').innerHTML = `✅ ${canais.length} Canais prontos.`;
        } catch (err) {
            document.getElementById('load-status').style.display = 'none';
            document.getElementById('setup-helper').style.display = 'block';
            console.error("Erro de CORS ou Conexão:", err);
        }
    }

    // 2. Processar texto M3U
    function parsearM3U(data) {
        const lines = data.split('\n');
        let tempName = "";
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                tempName = line.split(',')[1] || "Sem nome";
            } else if (line.startsWith('http')) {
                canais.push({ name: tempName, url: line });
            }
        }
    }

    // 3. Alternar telas
    function toggleView(type) {
        if (canais.length === 0) return alert("Lista ainda não carregada!");
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('player-screen').style.display = 'block';
        renderizarCanais(canais);
    }

    function renderizarCanais(lista) {
        const container = document.getElementById('channel-list');
        container.innerHTML = lista.map(c => 
            `<div class="list-group-item" onclick="player('${c.url}', '${c.name.replace(/'/g, "")}')">${c.name}</div>`
        ).join('');
    }

    // 4. Player de Vídeo
    function player(url, name) {
        document.getElementById('video-title').innerText = name;
        if (Hls.isSupported()) {
            hls.destroy(); // Limpa stream anterior
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
        }
    }

    function filterChannels() {
        const p = document.getElementById('search').value.toLowerCase();
        const filtrados = canais.filter(c => c.name.toLowerCase().includes(p));
        renderizarCanais(filtrados);
    }

    function backToMenu() {
        location.reload(); // Forma mais limpa de resetar o player
    }

    // Iniciar
    carregarLista();
    setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>

</body>
</html>
