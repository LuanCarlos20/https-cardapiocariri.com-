<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9f8f6; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .selected-flavor { border-color: #c2410c !important; background-color: #fff7ed !important; shadow: 0 0 10px rgba(194, 65, 12, 0.2); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .payment-btn.active { background-color: #c2410c !important; color: white !important; }
    </style>
</head>
<body class="pb-24">

    <header class="w-full h-52 bg-stone-900 relative flex flex-col items-center justify-center text-center p-4">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="relative z-10">
            <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-16 h-16 rounded-full border-2 border-white mb-2 shadow-lg mx-auto">
            <h1 class="text-white text-2xl font-serif font-bold">Pizzaria A Portuguesa</h1>
            <div id="status-loja" class="mt-1 px-3 py-1 rounded-full text-[10px] font-bold text-white bg-green-600 inline-block">Aberto Agora</div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-4">
        <h2 class="text-center font-serif text-xl my-4 text-stone-800">Escolha o Tamanho</h2>
        
        <div class="grid gap-3">
            <button onclick="openPizzaModal('P')" class="flex justify-between items-center bg-white p-5 rounded-2xl border border-stone-200 shadow-sm active:scale-95 transition">
                <div class="text-left"><span class="block font-bold text-lg">Pizza Pequena (P)</span><span class="text-xs text-stone-500">4 fatias • Até 2 sabores</span></div>
                <i class="fa fa-chevron-right text-orange-700"></i>
            </button>

            <button onclick="openPizzaModal('M')" class="flex justify-between items-center bg-white p-5 rounded-2xl border border-stone-200 shadow-sm active:scale-95 transition">
                <div class="text-left"><span class="block font-bold text-lg">Pizza Média (M)</span><span class="text-xs text-stone-500">6 fatias • Até 2 sabores</span></div>
                <i class="fa fa-chevron-right text-orange-700"></i>
            </button>

            <button onclick="openPizzaModal('G')" class="flex justify-between items-center bg-white p-5 rounded-2xl border border-stone-200 shadow-sm active:scale-95 transition">
                <div class="text-left"><span class="block font-bold text-lg">Pizza Grande (G)</span><span class="text-xs text-stone-500">8 fatias • Até 2 sabores</span></div>
                <i class="fa fa-chevron-right text-orange-700"></i>
            </button>
        </div>
    </main>

    <div id="modal-sabores" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end sm:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg h-[90vh] sm:h-[85vh] rounded-t-3xl sm:rounded-3xl flex flex-col">
            <div class="p-4 border-b flex justify-between items-center">
                <div>
                    <h2 id="modal-titulo" class="font-bold text-lg">Opções de Sabores</h2>
                    <p class="text-[10px] text-stone-500 font-bold uppercase tracking-widest">Escolha até 2 opções</p>
                </div>
                <button onclick="closeModal()" class="text-stone-400 text-3xl">&times;</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-2 scrollbar-hide" id="lista-sabores-container">
                </div>

            <div class="p-4 bg-stone-50 border-t space-y-4">
                <div>
                    <p class="text-xs font-bold text-stone-700 mb-2">Borda Recheada:</p>
                    <div class="grid grid-cols-2 gap-2" id="lista-bordas">
                        </div>
                </div>
                <textarea id="obs-pizza" placeholder="Observações (ex: tirar cebola)" class="w-full border rounded-xl p-3 text-sm outline-orange-500 resize-none"></textarea>
                <button onclick="addAoCarrinho()" class="w-full bg-orange-700 text-white font-bold py-4 rounded-2xl shadow-lg active:bg-orange-800">Adicionar ao Carrinho</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex items-center justify-between z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <div>
            <span class="text-[10px] text-stone-400 uppercase font-bold block">Meu Pedido</span>
            <span class="text-xl font-bold text-orange-800" id="total-geral">R$ 0,00</span>
        </div>
        <button onclick="abrirCheckout()" class="bg-orange-700 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg">Finalizar</button>
    </footer>

    <div id="modal-checkout" class="fixed inset-0 bg-black/60 z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 relative max-h-[90vh] overflow-y-auto">
            <button onclick="fecharCheckout()" class="absolute top-4 right-4 text-stone-400 text-2xl">&times;</button>
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Resumo do Pedido</h2>
            <div id="itens-checkout" class="space-y-3 mb-4"></div>
            
            <div class="space-y-3 pt-4 border-t">
                <select id="bairro" onchange="atualizarTotal()" class="w-full border p-3 rounded-xl text-sm">
                    <option value="0" data-taxa="0">Selecione o Bairro...</option>
                    <option value="Centro" data-taxa="3">Centro (R$ 3,00)</option>
                    <option value="Vila" data-taxa="4">Vila (R$ 4,00)</option>
                </select>
                <input type="text" id="nome-cliente" placeholder="Seu Nome" class="w-full border p-3 rounded-xl text-sm">
                <input type="text" id="endereco-cliente" placeholder="Endereço e Número" class="w-full border p-3 rounded-xl text-sm">
                <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg">Enviar no WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP = "5588992791644";
        let carrinho = [];
        let tamanhoSelecionado = "";
        let saboresSelecionados = [];
        let bordaSelecionada = null;

        const SABORES = [
            { id: 1, nome: "Americana", preco: 36, desc: "Presunto, mussarela, ovos e bacon." },
            { id: 2, nome: "Atum", preco: 31, desc: "Atum ralado e cebola." },
            { id: 3, nome: "Bacon", preco: 33, desc: "Mussarela e bacon crocante." },
            { id: 10, nome: "Calabresa c/ Mussarela", preco: 33, desc: "Calabresa fatiada e mussarela." },
            { id: 17, nome: "Frango c/ Catupiry", preco: 33, desc: "Frango desfiado com catupiry." },
            { id: 38, nome: "Portuguesa", preco: 36, desc: "Ovos, cebola, ervilha, presunto e mussarela." }
        ];

        const BORDAS = [
            { nome: "Sem Borda", preco: 0 },
            { nome: "Cheddar", preco: 7 },
            { nome: "Catupiry", preco: 7 },
            { nome: "Chocolate", preco: 8 }
        ];

        function openPizzaModal(tam) {
            tamanhoSelecionado = tam;
            saboresSelecionados = [];
            bordaSelecionada = BORDAS[0];
            document.getElementById('modal-titulo').innerText = `Pizza ${tam} - Sabores`;
            document.getElementById('modal-sabores').classList.remove('hidden');
            renderizarSabores();
        }

        function renderizarSabores() {
            const container = document.getElementById('lista-sabores-container');
            container.innerHTML = SABORES.map(s => `
                <div onclick="toggleSabor(${s.id})" id="sabor-${s.id}" class="flex justify-between items-center p-3 border rounded-xl cursor-pointer transition-all bg-white ${saboresSelecionados.includes(s.id) ? 'selected-flavor' : ''}">
                    <div class="text-left pr-2">
                        <p class="font-bold text-sm">${s.id.toString().padStart(2, '0')} ${s.nome}</p>
                        <p class="text-[10px] text-stone-500">${s.desc}</p>
                    </div>
                    <span class="font-bold text-orange-800 text-sm">R$ ${s.preco.toFixed(2)}</span>
                </div>
            `).join('');

            const bordasDiv = document.getElementById('lista-bordas');
            bordasDiv.innerHTML = BORDAS.map((b, i) => `
                <button onclick="setBorda(${i})" class="border p-2 rounded-xl text-[10px] font-bold ${bordaSelecionada.nome === b.nome ? 'bg-orange-700 text-white' : 'bg-white'}">
                    ${b.nome} (+R$ ${b.preco})
                </button>
            `).join('');
        }

        function toggleSabor(id) {
            const idx = saboresSelecionados.indexOf(id);
            if (idx > -1) {
                saboresSelecionados.splice(idx, 1);
            } else {
                if (saboresSelecionados.length >= 2) saboresSelecionados.shift();
                saboresSelecionados.push(id);
            }
            renderizarSabores();
        }

        function setBorda(i) {
            bordaSelecionada = BORDAS[i];
            renderizarSabores();
        }

        function closeModal() {
            document.getElementById('modal-sabores').classList.add('hidden');
        }

        function addAoCarrinho() {
            if (saboresSelecionados.length === 0) return alert("Escolha pelo menos 1 sabor!");
            
            const itensSabores = saboresSelecionados.map(id => SABORES.find(s => s.id === id));
            const precoBase = Math.max(...itensSabores.map(s => s.preco));
            const totalItem = precoBase + bordaSelecionada.preco;
            const obs = document.getElementById('obs-pizza').value;

            const nomePizza = itensSabores.length === 1 
                ? `Pizza ${tamanhoSelecionado} ${itensSabores[0].nome}` 
                : `Pizza ${tamanhoSelecionado} (1/2 ${itensSabores[0].nome} e 1/2 ${itensSabores[1].nome})`;

            carrinho.push({ nome: nomePizza, preco: totalItem, borda: bordaSelecionada.nome, obs });
            
            closeModal();
            document.getElementById('obs-pizza').value = "";
            atualizarTotal();
            alert("Adicionado!");
        }

        function atualizarTotal() {
            const selectBairro = document.getElementById('bairro');
            const taxa = parseFloat(selectBairro.options[selectBairro.selectedIndex].getAttribute('data-taxa') || 0);
            const subtotal = carrinho.reduce((acc, item) => acc + item.preco, 0);
            document.getElementById('total-geral').innerText = `R$ ${(subtotal + taxa).toFixed(2)}`;
        }

        function abrirCheckout() {
            if (carrinho.length === 0) return alert("Carrinho vazio!");
            document.getElementById('modal-checkout').classList.remove('hidden');
            const lista = document.getElementById('itens-checkout');
            lista.innerHTML = carrinho.map((item, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-2 rounded-lg text-sm border">
                    <div>
                        <p class="font-bold">${item.nome}</p>
                        <p class="text-[10px] text-stone-500">Borda: ${item.borda}</p>
                    </div>
                    <button onclick="carrinho.splice(${i}, 1); abrirCheckout(); atualizarTotal();" class="text-red-500 font-bold">X</button>
                </div>
            `).join('');
        }

        function fecharCheckout() { document.getElementById('modal-checkout').classList.add('hidden'); }

        function enviarWhatsApp() {
            const nome = document.getElementById('nome-cliente').value;
            const endereco = document.getElementById('endereco-cliente').value;
            const bairro = document.getElementById('bairro').value;
            if (!nome || !endereco || bairro === "0") return alert("Preencha seus dados!");

            let msg = `*NOVO PEDIDO - A PORTUGUESA*\n\n`;
            msg += `👤 *Cliente:* ${nome}\n📍 *End:* ${endereco}\n🏘️ *Bairro:* ${bairro}\n\n*ITENS:*\n`;
            
            carrinho.forEach(i => {
                msg += `• ${i.nome} (R$ ${i.preco.toFixed(2)})\n  └ Borda: ${i.borda} ${i.obs ? '\n  └ Obs: '+i.obs : ''}\n`;
            });

            msg += `\n*TOTAL: ${document.getElementById('total-geral').innerText}*`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
