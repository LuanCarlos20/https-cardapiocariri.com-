<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf8; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .selected-flavor { border-color: #c2410c !important; background-color: #fff7ed !important; }
        .payment-btn.active { background-color: #c2410c !important; color: white !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="w-full h-48 bg-stone-900 relative flex flex-col items-center justify-center text-center p-4">
        <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-16 h-16 rounded-full border-2 border-white mb-2 shadow-lg">
        <h1 class="text-white text-2xl font-serif font-bold">Pizzaria A Portuguesa</h1>
        <div id="status-loja" class="mt-1 px-3 py-1 rounded-full text-[10px] font-bold text-white bg-green-600">Aberto Agora</div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <h2 class="text-center font-serif text-xl mb-4 text-stone-800">Escolha o Tamanho da Pizza</h2>
        <div class="grid grid-cols-1 gap-3 mb-8">
            <button onclick="openPizzaModal('P')" class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-stone-200 hover:border-orange-500 transition-all">
                <div class="text-left"><span class="block font-bold text-lg">Pizza Pequena (P)</span><span class="text-xs text-stone-500">4 Fatias - Até 2 sabores</span></div>
                <span class="bg-orange-100 text-orange-800 px-3 py-1 rounded-lg font-bold">Ver Sabores</span>
            </button>
            <button onclick="openPizzaModal('M')" class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-stone-200 hover:border-orange-500 transition-all">
                <div class="text-left"><span class="block font-bold text-lg">Pizza Média (M)</span><span class="text-xs text-stone-500">6 Fatias - Até 2 sabores</span></div>
                <span class="bg-orange-100 text-orange-800 px-3 py-1 rounded-lg font-bold">Ver Sabores</span>
            </button>
            <button onclick="openPizzaModal('G')" class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-stone-200 hover:border-orange-500 transition-all">
                <div class="text-left"><span class="block font-bold text-lg">Pizza Grande (G)</span><span class="text-xs text-stone-500">8 Fatias - Até 2 sabores</span></div>
                <span class="bg-orange-100 text-orange-800 px-3 py-1 rounded-lg font-bold">Ver Sabores</span>
            </button>
        </div>
    </main>

    <div id="pizza-modal" class="fixed inset-0 bg-black/70 z-[70] hidden flex items-end sm:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl h-[90vh] sm:h-[80vh] rounded-t-3xl sm:rounded-3xl flex flex-col overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-stone-50">
                <div>
                    <h2 id="modal-title" class="font-bold text-lg">Opções de Sabores</h2>
                    <p class="text-[10px] text-stone-500 uppercase font-bold tracking-wider">Escolha até 2 sabores</p>
                </div>
                <button onclick="closePizzaModal()" class="text-stone-400 text-2xl">&times;</button>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-2 scrollbar-hide" id="flavors-list">
                </div>

            <div class="p-4 border-t bg-stone-50">
                <p class="text-xs font-bold text-stone-700 mb-2">Borda Recheada:</p>
                <div class="grid grid-cols-2 gap-2 mb-4" id="borders-list">
                    </div>
                <textarea id="pizza-obs" placeholder="Alguma observação? (ex: sem cebola)" class="w-full border rounded-xl p-2 text-sm mb-3 outline-orange-500" rows="2"></textarea>
                <button onclick="confirmPizza()" class="w-full bg-orange-700 text-white font-bold py-4 rounded-2xl shadow-lg">Adicionar ao Carrinho</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex items-center justify-between z-50">
        <div class="text-left">
            <span class="text-[10px] text-stone-500 uppercase font-bold">Total do Pedido</span>
            <span class="text-xl font-bold text-orange-800 block" id="cart-total">R$ 0,00</span>
        </div>
        <button onclick="toggleCart(true)" class="bg-orange-700 text-white px-8 py-3.5 rounded-2xl font-bold shadow-lg">Ver Carrinho</button>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[80] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 max-h-[85vh] overflow-y-auto relative">
            <button onclick="toggleCart(false)" class="absolute top-4 right-4 text-stone-400 text-2xl">&times;</button>
            <h2 class="text-xl font-bold mb-4 border-b pb-2">Meu Pedido</h2>
            <div id="cart-items" class="space-y-4 mb-4"></div>
            
            <div class="space-y-3">
                <select id="delivery-loc" onchange="updateUI()" class="w-full border p-3 rounded-xl text-sm bg-stone-50">
                    <option value="0" data-fee="0">Selecione o Bairro...</option>
                    <option value="Centro" data-fee="3.00">Centro (R$ 3,00)</option>
                    <option value="Vila" data-fee="4.00">Vila (R$ 4,00)</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="setPay('Pix')" id="pay-Pix" class="payment-btn flex-1 border py-2 rounded-xl text-xs font-bold bg-white">Pix</button>
                    <button onclick="setPay('Cartao')" id="pay-Cartao" class="payment-btn flex-1 border py-2 rounded-xl text-xs font-bold bg-white">Cartão</button>
                    <button onclick="setPay('Dinheiro')" id="pay-Dinheiro" class="payment-btn flex-1 border py-2 rounded-xl text-xs font-bold bg-white">Dinheiro</button>
                </div>
                <input type="text" id="cust-name" placeholder="Nome" class="w-full border p-3 rounded-xl text-sm">
                <input type="text" id="cust-addr" placeholder="Endereço Completo" class="w-full border p-3 rounded-xl text-sm">
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg">Enviar WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const WHATS_NUM = "5588992791644";
        let cart = [];
        let selectedSize = "";
        let selectedFlavors = [];
        let selectedBorder = null;
        let paymentMethod = "";

        const SABORES = [
            {id: 1, name: "Americana", price: 36, desc: "Presunto, mussarela, ovos e bacon."},
            {id: 2, name: "Atum", price: 31, desc: "Atum ralado e cebola."},
            {id: 3, name: "Bacon", price: 33, desc: "Mussarela e bacon crocante."},
            {id: 4, name: "Bacon 2", price: 37, desc: "Bacon extra, milho e catupiry."},
            {id: 5, name: "Baiana", price: 35, desc: "Calabresa moída, pimenta e ovos."},
            {id: 10, name: "Calabresa com Mussarela", price: 33, desc: "Fatias de calabresa e mussarela."},
            {id: 17, name: "Frango c/ Catupiry", price: 33, desc: "Frango desfiado com catupiry."},
            {id: 38, name: "Portuguesa", price: 36, desc: "Presunto, ovos, cebola, ervilha e mussarela."}
            // ... Adicione os outros conforme sua lista
        ];

        const BORDAS = [
            {name: "Sem Borda", price: 0},
            {name: "Cheddar", price: 7},
            {name: "Catupiry", price: 7},
            {name: "Catupiry Original", price: 9},
            {name: "Chocolate", price: 8}
        ];

        function openPizzaModal(size) {
            selectedSize = size;
            selectedFlavors = [];
            selectedBorder = BORDAS[0];
            document.getElementById('modal-title').innerText = `Pizza ${size} - Escolha os Sabores`;
            document.getElementById('pizza-modal').classList.remove('hidden');
            renderModalContent();
        }

        function renderModalContent() {
            const flavorDiv = document.getElementById('flavors-list');
            flavorDiv.innerHTML = SABORES.map(s => `
                <div onclick="selectFlavor(${s.id})" id="fl-${s.id}" class="flex justify-between items-center p-3 border rounded-xl bg-white cursor-pointer transition-all">
                    <div class="text-left pr-2">
                        <p class="font-bold text-sm">${s.id.toString().padStart(2, '0')} ${s.name}</p>
                        <p class="text-[10px] text-stone-500">${s.desc}</p>
                    </div>
                    <span class="font-bold text-orange-700 text-sm whitespace-nowrap">R$ ${s.price.toFixed(2)}</span>
                </div>
            `).join('');

            const borderDiv = document.getElementById('borders-list');
            borderDiv.innerHTML = BORDAS.map((b, i) => `
                <button onclick="selectBorder(${i})" id="brd-${i}" class="border p-2 rounded-xl text-[10px] font-bold ${selectedBorder.name === b.name ? 'selected-flavor' : 'bg-white'}">
                    ${b.name} (+R$ ${b.price})
                </button>
            `).join('');
        }

        function selectFlavor(id) {
            const index = selectedFlavors.indexOf(id);
            if (index > -1) {
                selectedFlavors.splice(index, 1);
            } else {
                if (selectedFlavors.length < 2) selectedFlavors.push(id);
                else { selectedFlavors.shift(); selectedFlavors.push(id); }
            }
            
            document.querySelectorAll('[id^="fl-"]').forEach(el => el.classList.remove('selected-flavor'));
            selectedFlavors.forEach(fid => document.getElementById(`fl-${fid}`).classList.add('selected-flavor'));
        }

        function selectBorder(index) {
            selectedBorder = BORDAS[index];
            renderModalContent();
        }

        function confirmPizza() {
            if (selectedFlavors.length === 0) return alert("Selecione pelo menos 1 sabor!");
            
            const flavs = selectedFlavors.map(id => SABORES.find(s => s.id === id));
            // Preço é a média ou o maior? Geralmente pizzaria cobra o maior. Vamos usar o maior:
            const basePrice = Math.max(...flavs.map(f => f.price));
            const totalPrice = basePrice + selectedBorder.price;
            const obs = document.getElementById('pizza-obs').value;

            const name = flavs.length === 1 ? `Pizza ${selectedSize} ${flavs[0].name}` : `Pizza ${selectedSize} (1/2 ${flavs[0].name} e 1/2 ${flavs[1].name})`;

            cart.push({ name, price: totalPrice, border: selectedBorder.name, obs });
            closePizzaModal();
            updateUI();
        }

        function updateUI() {
            const d = document.getElementById('delivery-loc');
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee') || 0);
            const sub = cart.reduce((a, b) => a + b.price, 0);
            const total = sub + fee;

            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('summary-total-val') ? document.getElementById('summary-total-val').innerText = `R$ ${total.toFixed(2)}` : null;

            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="bg-stone-50 p-3 rounded-xl border flex justify-between items-center text-sm">
                    <div class="text-left">
                        <p class="font-bold">${item.name}</p>
                        <p class="text-[10px] text-stone-500">Borda: ${item.border} ${item.obs ? ' | OBS: '+item.obs : ''}</p>
                        <p class="text-orange-700 font-bold">R$ ${item.price.toFixed(2)}</p>
                    </div>
                    <button onclick="cart.splice(${i}, 1); updateUI();" class="text-red-500 text-xs font-bold">Remover</button>
                </div>
            `).join('');
        }

        function closePizzaModal() { document.getElementById('pizza-modal').classList.add('hidden'); document.getElementById('pizza-obs').value = ''; }
        function toggleCart(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }
        function setPay(m) { paymentMethod = m; document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active')); document.getElementById(`pay-${m}`).classList.add('active'); }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-addr').value;
            const loc = document.getElementById('delivery-loc').value;
            if (!cart.length || !name || !addr || loc === "0" || !paymentMethod) return alert("Preencha todos os dados!");

            let msg = `*NOVO PEDIDO - A PORTUGUESA*\n\n👤 *Cliente:* ${name}\n📍 *End:* ${addr}\n🏘️ *Bairro:* ${loc}\n💳 *Pag:* ${paymentMethod}\n\n*ITENS:*\n`;
            cart.forEach(i => msg += `• ${i.name}\n  └ Borda: ${i.border}${i.obs ? '\n  └ Obs: '+i.obs : ''}\n`);
            
            const total = document.getElementById('cart-total').innerText;
            msg += `\n*TOTAL: ${total}*\n⏱️ *Preparo:* 30 a 50 min`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATS_NUM}&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
