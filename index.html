<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        #splash-screen {
            position: fixed; inset: 0; background: #1c1917; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }
        .animate-pulse-green { animation: pulse-green 2s infinite; border-color: #16a34a !important; }
        
        .payment-btn.active { background-color: #c2410c !important; color: white !important; border-color: #c2410c !important; }
        .price-green { color: #22c55e; font-size: 1.5rem; font-weight: bold; }
        .border-box { background: #f9f9f9; border: 1px solid #eee; border-radius: 12px; padding: 15px; }
        
        /* Estilo para sabor selecionado igual à imagem */
        .sabor-item.selected { border-left: 4px solid #3b82f6; background-color: #eff6ff; }
        .checkbox-custom { width: 20px; height: 20px; border: 2px solid #ddd; border-radius: 4px; }
        .checkbox-custom.checked { background-color: #3b82f6; border-color: #3b82f6; position: relative; }
        .checkbox-custom.checked::after { content: '✓'; color: white; position: absolute; top: -2px; left: 3px; font-size: 14px; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24">

    <div id="splash-screen">
        <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-32 h-32 rounded-full border-4 border-orange-600 mb-4 animate-bounce">
        <h1 class="text-white text-2xl font-serif">Bem-vindo ao</h1>
        <h2 class="text-orange-500 text-3xl font-bold">Cardápio Portuguesa</h2>
    </div>

    <header class="w-full h-[200px] bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-center p-4">
            <img id="logo-pizzaria" src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-20 h-20 rounded-full object-cover border-4 border-transparent shadow-xl mb-2">
            <h1 class="text-white text-2xl font-serif font-bold">Pizzaria A Portuguesa</h1>
            <div id="status-loja" class="mt-2 text-white px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2">
                <i class="fa fa-clock"></i> <span id="status-texto">Verificando...</span>
            </div>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-md z-40 overflow-x-auto whitespace-nowrap p-3 flex gap-3 scrollbar-hide">
        <button onclick="filterCategory('todas')" class="px-5 py-2 rounded-full bg-orange-700 text-white text-sm font-semibold shadow-sm">Todas</button>
        <button onclick="filterCategory('pizzas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Pizzas</button>
        <button onclick="filterCategory('esfirras')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Esfirras</button>
        <button onclick="filterCategory('bebidas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm hover:bg-orange-100 transition font-medium">Bebidas</button>
    </nav>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 mt-2" id="menu-container"></main>

    <div id="pizza-modal" class="fixed inset-0 bg-black/70 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl max-h-[90vh] overflow-hidden flex flex-col relative">
            <div class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 id="modal-pizza-title" class="font-bold text-lg uppercase text-left">ITEM</h2>
                <button onclick="closePizzaModal()" class="bg-red-500 text-white w-8 h-8 rounded-md text-xl font-bold">×</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                <div id="modal-pizza-price" class="price-green">R$ 0,00</div>
                
                <div class="flex justify-between items-center border-b pb-1">
                    <span class="font-bold text-sm">Opções de Sabores</span>
                    <span id="flavor-limit-text" class="text-xs text-stone-500">Escolha até 2</span>
                </div>

                <div id="sabores-lista" class="space-y-2"></div>

                <div id="borda-container" class="border-box text-left">
                    <p class="font-bold text-[10px] uppercase mb-3 tracking-widest text-stone-600">BORDAS RECHEADAS</p>
                    <div id="bordas-lista" class="space-y-3"></div>
                </div>

                <div class="text-left">
                    <label class="font-bold text-sm">Observação</label>
                    <textarea id="pizza-obs" class="w-full border rounded-xl p-3 mt-1 outline-none focus:ring-1 focus:ring-green-500" placeholder="Ex: Sem cebola..."></textarea>
                </div>
            </div>
            <div class="p-4 border-t bg-white">
                <button onclick="confirmItem()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl uppercase tracking-wider">
                    Adicionar ao Carrinho
                </button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t border-stone-200 p-4 flex items-center justify-between z-50">
        <div class="flex flex-col text-left">
            <span class="text-[10px] text-stone-500 uppercase font-bold tracking-widest">Total + Entrega</span>
            <span class="text-xl font-bold text-orange-800" id="cart-total">R$ 0,00</span>
        </div>
        <button onclick="toggleModal(true)" class="bg-orange-700 hover:bg-orange-800 text-white px-8 py-3.5 rounded-2xl font-bold flex items-center gap-2">
            Ver Pedido <i class="fa fa-shopping-basket"></i>
        </button>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-stone-400 text-3xl">×</button>
            <h2 class="text-2xl font-serif font-bold mb-6 border-b pb-4 text-stone-800 text-left">Meu Pedido</h2>
            <div id="cart-items" class="space-y-4 mb-6"></div>
            
            <div class="mb-6 bg-stone-50 p-4 rounded-2xl border border-stone-200 text-sm text-left">
                <label class="font-bold mb-2 block text-stone-700">Bairro para Entrega:</label>
                <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-3 bg-white border mb-3">
                    </select>
                <div class="flex justify-between font-bold text-lg text-orange-800 border-t pt-2 mt-2">
                    <span>Total:</span> <span id="summary-total">R$ 0,00</span>
                </div>
            </div>

            <div class="space-y-4">
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full border rounded-xl p-3 outline-orange-500">
                <input type="text" id="cust-address" placeholder="Rua e Número" class="w-full border rounded-xl p-3 outline-orange-500">
                
                <p class="text-sm font-bold text-left text-stone-700">Pagamento:</p>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border rounded-xl py-2 text-xs font-bold bg-white">Pix</button>
                    <button onclick="setPayment('Cartao')" id="pay-Cartao" class="payment-btn border rounded-xl py-2 text-xs font-bold bg-white">Cartão</button>
                    <button onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border rounded-xl py-2 text-xs font-bold bg-white">Dinheiro</button>
                </div>

                <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl text-lg mt-2">
                    Finalizar no WhatsApp <i class="fab fa-whatsapp ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        const STORE_NAME = "Pizzaria A Portuguesa";
        
        // CONFIGURAÇÕES DE ENTREGA
        const TAXAS_ENTREGA = [
            { bairro: "Centro", taxa: 3.00 },
            { bairro: "Cirolândia", taxa: 3.50 },
            { bairro: "Malvinas", taxa: 4.00 },
            { bairro: "Bulandeira", taxa: 4.50 },
            { bairro: "Vila Santo Antônio", taxa: 5.00 },
            { bairro: "Caldas", taxa: 6.00 },
            { bairro: "Arajara", taxa: 8.00 }
        ];

        // SABORES COM PREÇOS POR TAMANHO
        const SABORES_PIZZA = [
            { id: 1, nome: "01 americana", desc: "molho, carne de sol, frango, cebola caramelizada, muçarela e orégano", precos: { 'P': 36, 'M': 42, 'G': 48, 'GG': 55 } },
            { id: 2, nome: "02 atum", desc: "molho, atum, cebola, muçarela e orégano", precos: { 'P': 31, 'M': 37, 'G': 43, 'GG': 50 } },
            { id: 3, nome: "03 bacon", desc: "molho, bacon, muçarela e orégano", precos: { 'P': 33, 'M': 39, 'G': 45, 'GG': 52 } },
            { id: 4, nome: "04 bacon 2", desc: "molho, mussarela, bacon, rodelas de tomate, catupiry original e orégano", precos: { 'P': 37, 'M': 44, 'G': 50, 'GG': 58 } }
        ];

        const BORDAS = [
            { nome: "Cheddar", preco: 7 },
            { nome: "Catupiry", preco: 7 },
            { nome: "Catupiry Original", preco: 9 }
        ];

        let cart = [];
        let curItem = { type: '', size: '', selectedFlavors: {}, border: null, qty: 1 };
        let paymentMethod = "";

        // Inicialização
        window.onload = () => {
            renderMenu();
            renderDeliveryOptions();
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 2000);
        };

        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            if(cat === 'todas' || cat === 'pizzas') {
                ['P', 'M', 'G', 'GG'].forEach(s => {
                    container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" class="w-20 h-20 rounded-xl object-cover">
                        <div class="flex-1 text-left">
                            <h3 class="font-bold text-sm uppercase">PIZZA (${s})</h3>
                            <p class="text-[10px] text-stone-400">Ver valores por sabor</p>
                            <button onclick="openModal('pizza', '${s}')" class="mt-2 w-full bg-green-500 text-white py-2 rounded-full font-bold text-xs">Escolher Sabores</button>
                        </div>
                    </div>`;
                });
            }
        }

        function renderDeliveryOptions() {
            const select = document.getElementById('delivery-location');
            select.innerHTML = '<option value="0" data-fee="0">Selecione seu bairro...</option>';
            TAXAS_ENTREGA.forEach(t => {
                select.innerHTML += `<option value="${t.bairro}" data-fee="${t.taxa}">${t.bairro} (R$ ${t.taxa.toFixed(2)})</option>`;
            });
        }

        function openModal(type, size = '') {
            curItem = { type, size, selectedFlavors: {}, border: null, qty: 1 };
            document.getElementById('modal-pizza-title').innerText = `PIZZA (${size})`;
            document.getElementById('pizza-obs').value = "";
            renderSaboresModal();
            renderBordas();
            updateModalPrice();
            document.getElementById('pizza-modal').classList.remove('hidden');
        }

        function renderSaboresModal() {
            const container = document.getElementById('sabores-lista');
            container.innerHTML = SABORES_PIZZA.map(s => {
                const isSelected = curItem.selectedFlavors[s.id];
                const precoSabor = s.precos[curItem.size];
                
                return `
                <div class="sabor-item p-3 border rounded-xl transition-all ${isSelected ? 'selected' : ''}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleSabor(${s.id})">
                            <div class="checkbox-custom ${isSelected ? 'checked' : ''}"></div>
                            <div>
                                <p class="text-sm font-bold uppercase">${s.nome}</p>
                                <p class="text-[10px] text-stone-400">${s.desc}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold">R$ ${precoSabor.toFixed(2)}</span>
                            ${isSelected ? `
                                <div class="flex items-center gap-2 bg-stone-100 rounded-full px-2 py-1">
                                    <button onclick="toggleSabor(${s.id})" class="text-red-500 font-bold text-lg leading-none">－</button>
                                    <span class="text-xs font-bold">1</span>
                                    <button class="text-green-500 font-bold text-lg leading-none">＋</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleSabor(id) {
            if(curItem.selectedFlavors[id]) {
                delete curItem.selectedFlavors[id];
            } else {
                if(Object.keys(curItem.selectedFlavors).length >= 2) return alert("Máximo 2 sabores!");
                const s = SABORES_PIZZA.find(x => x.id === id);
                curItem.selectedFlavors[id] = { name: s.nome, price: s.precos[curItem.size] };
            }
            renderSaboresModal();
            updateModalPrice();
        }

        function updateModalPrice() {
            let total = 0;
            const selecionados = Object.values(curItem.selectedFlavors);
            if(selecionados.length > 0) {
                // Lógica da Pizza mais cara
                total = Math.max(...selecionados.map(s => s.price));
            }
            if(curItem.border) total += curItem.border.preco;
            document.getElementById('modal-pizza-price').innerText = `R$ ${total.toFixed(2)}`;
        }

        function confirmItem() {
            if(Object.keys(curItem.selectedFlavors).length === 0) return alert("Escolha um sabor!");
            const nomes = Object.values(curItem.selectedFlavors).map(s => s.name).join(' / ');
            const precoFinal = Math.max(...Object.values(curItem.selectedFlavors).map(s => s.price)) + (curItem.border ? curItem.border.preco : 0);
            
            cart.push({
                name: `Pizza (${curItem.size}) - ${nomes}`,
                price: precoFinal,
                extra: curItem.border ? `Borda: ${curItem.border.nome}` : "Sem borda",
                obs: document.getElementById('pizza-obs').value,
                qty: 1
            });
            closePizzaModal();
            updateCartUI();
        }

        function renderBordas() {
            document.getElementById('bordas-lista').innerHTML = BORDAS.map(b => `
                <div class="flex justify-between items-center text-sm">
                    <label class="flex items-center gap-2">
                        <input type="radio" name="borda" onchange="setBorda('${b.nome}')" class="w-4 h-4 accent-orange-600">
                        ${b.nome}
                    </label>
                    <span class="font-bold">R$ ${b.preco.toFixed(2)}</span>
                </div>`).join('');
        }

        function setBorda(nome) { curItem.border = BORDAS.find(b => b.nome === nome); updateModalPrice(); }
        function closePizzaModal() { document.getElementById('pizza-modal').classList.add('hidden'); }
        function toggleModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }
        function setPayment(m) { paymentMethod = m; document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active')); document.getElementById(`pay-${m}`).classList.add('active'); }

        function updateCartUI() {
            const d = document.getElementById('delivery-location');
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee') || 0);
            const subtotal = cart.reduce((a, c) => a + c.price, 0);
            const totalStr = `R$ ${(subtotal + fee).toFixed(2)}`;
            document.getElementById('cart-total').innerText = totalStr;
            document.getElementById('summary-total').innerText = totalStr;
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="bg-stone-50 p-3 rounded-xl border flex justify-between items-center">
                    <div class="text-left">
                        <p class="font-bold text-sm">${item.name}</p>
                        <p class="text-[10px] text-stone-500">${item.extra}</p>
                        <p class="text-xs font-bold text-orange-700">R$ ${item.price.toFixed(2)}</p>
                    </div>
                    <button onclick="removeItem(${i})" class="text-red-500"><i class="fa fa-trash"></i></button>
                </div>`).join('');
        }

        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }

        function sendOrder() {
            const d = document.getElementById('delivery-location'), n = document.getElementById('cust-name').value, a = document.getElementById('cust-address').value;
            if(!cart.length || d.value === "0" || !paymentMethod || !n || !a) return alert("Preencha tudo!");
            
            let msg = `*NOVO PEDIDO - ${STORE_NAME}*\n\n👤 *Cliente:* ${n}\n📍 *End:* ${a}\n🏘️ *Bairro:* ${d.value}\n💳 *Pag:* ${paymentMethod}\n\n🛒 *ITENS:*\n`;
            cart.forEach(i => msg += `• ${i.name}\n  _${i.extra}_\n`);
            msg += `\n*TOTAL: ${document.getElementById('summary-total').innerText}*`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
