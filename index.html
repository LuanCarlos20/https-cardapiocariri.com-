<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Auto Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; height: 100-vh; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        
        /* Sidebar de Canais */
        .sidebar { background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .search-box { padding: 15px; background: #0f172a; }
        .channel-list { overflow-y: auto; flex-grow: 1; }
        .channel-item { 
            padding: 12px 20px; border-bottom: 1px solid #334155; cursor: pointer; 
            transition: 0.2s; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .channel-item:hover { background: #334155; color: #38bdf8; }
        .channel-item.active { background: #0284c7; color: white; font-weight: bold; }

        /* Área do Vídeo */
        .content { display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .overlay-info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; pointer-events: none; }
        
        /* Loading */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner mb-3"></div>
    <p>Sincronizando Lista IPTV...</p>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="search-box">
            <h5 class="mb-3">Smarters Web Auto</h5>
            <input type="text" id="search" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="Buscar canal..." onkeyup="filter()">
        </div>
        <div class="channel-list" id="list">
            </div>
    </div>

    <div class="content">
        <div class="overlay-info" id="playing-now">Selecione um canal</div>
        <video id="video" controls autoplay></video>
    </div>
</div>

<script>
    const M3U_URL = "http://iptvperfeito.ddns.net:25461/get.php?username=197388121&password=197388121&type=m3u_plus&output=ts";
    let channels = [];
    const video = document.getElementById('video');
    const hls = new Hls({ enableWorker: true, lowLatencyMode: true });

    async function init() {
        try {
            // Tenta carregar a lista
            const res = await fetch(M3U_URL);
            const data = await res.text();
            parse(data);
            
            // Esconde o loader e renderiza
            document.getElementById('loader').style.display = 'none';
            render(channels);
        } catch (e) {
            document.querySelector('#loader p').innerHTML = "<span class='text-danger'>Erro de Conexão (CORS).<br>Ative a extensão 'Allow CORS' no navegador.</span>";
        }
    }

    function parse(data) {
        const lines = data.split('\n');
        let current = null;
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                current = line.split(',')[1];
            } else if (line.startsWith('http') && current) {
                channels.push({ name: current, url: line });
                current = null;
            }
        }
    }

    function render(data) {
        const container = document.getElementById('list');
        container.innerHTML = data.map((c, index) => `
            <div class="channel-item" onclick="play('${c.url}', '${c.name}', this)">
                ${c.name}
            </div>
        `).join('');
    }

    function play(url, name, el) {
        // Estética da lista
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('playing-now').innerText = "Assistindo: " + name;

        // Lógica do Player
        if (Hls.isSupported()) {
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
        }
    }

    function filter() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = channels.filter(c => c.name.toLowerCase().includes(term));
        render(filtered);
    }

    init();
</script>

</body>
</html>
