<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Cariri - O Guia da Região</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .category-card:active { transform: scale(0.95); }
        .active-filter { background-color: #c2410c !important; color: white !important; }
    </style>
</head>
<body class="pb-24">

    <header id="main-header" class="w-full h-[200px] bg-orange-800 relative transition-all duration-500 overflow-hidden">
        <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center text-center p-4">
            <div id="back-btn" onclick="renderHome()" class="hidden absolute top-6 left-4 bg-white/20 p-3 rounded-full cursor-pointer hover:bg-white/40">
                <i class="fa fa-arrow-left text-white"></i>
            </div>
            <h1 id="header-title" class="text-white text-3xl font-serif font-bold">Cardápio Cariri</h1>
            <p id="header-subtitle" class="text-orange-200 text-sm mt-1">As melhores lojas da região em um só lugar</p>
        </div>
    </header>

    <nav id="category-nav" class="sticky top-0 bg-white shadow-sm z-40 overflow-x-auto whitespace-nowrap p-3 flex gap-3 scrollbar-hide">
        <button onclick="filterBySegment('todos')" class="segment-btn px-6 py-2 rounded-full bg-stone-100 text-sm font-bold active-filter">Todos</button>
        <button onclick="filterBySegment('pizzaria')" class="segment-btn px-6 py-2 rounded-full bg-stone-100 text-sm font-medium">🍕 Pizzas</button>
        <button onclick="filterBySegment('hamburgueria')" class="segment-btn px-6 py-2 rounded-full bg-stone-100 text-sm font-medium">🍔 Burger</button>
        <button onclick="filterBySegment('farmacia')" class="segment-btn px-6 py-2 rounded-full bg-stone-100 text-sm font-medium">💊 Farmácia</button>
        <button onclick="filterBySegment('acai')" class="segment-btn px-6 py-2 rounded-full bg-stone-100 text-sm font-medium">🍧 Açaí</button>
    </nav>

    <div class="max-w-6xl mx-auto px-4 mt-4">
        <div class="relative">
            <input type="text" id="search-input" oninput="handleSearch()" placeholder="O que você procura hoje?" 
                   class="w-full bg-white border border-stone-200 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-orange-500 shadow-sm">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4 mt-2" id="main-content"></main>

    <footer id="cart-footer" class="hidden fixed bottom-0 w-full bg-white border-t p-4 flex items-center justify-between z-50">
        <div class="flex flex-col">
            <span class="text-[10px] text-stone-500 uppercase font-bold">Subtotal</span>
            <span class="text-xl font-bold text-orange-800" id="cart-total">R$ 0,00</span>
        </div>
        <button onclick="toggleModal(true)" class="bg-orange-700 text-white px-8 py-3 rounded-2xl font-bold flex items-center gap-2">
            Ver Sacola <i class="fa fa-shopping-basket"></i>
        </button>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-stone-400 text-3xl">&times;</button>
            <h2 class="text-2xl font-serif font-bold mb-4 border-b pb-2">Meu Pedido</h2>
            <div id="cart-items" class="space-y-3 mb-4"></div>
            
            <div class="bg-stone-50 p-4 rounded-2xl mb-4 text-sm">
                <select id="delivery-location" onchange="updateCartUI()" class="w-full rounded-xl p-3 border mb-2">
                    <option value="0" data-fee="0">Selecione o Bairro...</option>
                    <option value="Centro" data-fee="5">Centro (R$ 5,00)</option>
                    <option value="Bairro 1" data-fee="7">Bairro 1 (R$ 7,00)</option>
                </select>
                <div class="flex justify-between font-bold text-lg border-t pt-2"><span>Total:</span> <span id="summary-total">R$ 0,00</span></div>
            </div>

            <div class="space-y-3">
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full border rounded-xl p-3">
                <input type="text" id="cust-address" placeholder="Endereço e Número" class="w-full border rounded-xl p-3">
                <div class="grid grid-cols-3 gap-2" id="payment-methods">
                    <button onclick="setPayment('Pix')" class="pay-btn border rounded-xl py-2 text-xs font-bold">Pix</button>
                    <button onclick="setPayment('Cartão')" class="pay-btn border rounded-xl py-2 text-xs font-bold">Cartão</button>
                    <button onclick="setPayment('Dinheiro')" class="pay-btn border rounded-xl py-2 text-xs font-bold">Dinheiro</button>
                </div>
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl">Finalizar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURAÇÃO DE DADOS ---
        const STORES = [
            { id: 1, name: "Pizzaria A Portuguesa", segment: "pizzaria", whatsapp: "5588992791644", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400", color: "#7c2d12" },
            { id: 2, name: "Burger do Cariri", segment: "hamburgueria", whatsapp: "5588000000000", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400", color: "#1c1917" },
            { id: 3, name: "Farmácia 24h", segment: "farmacia", whatsapp: "5588111111111", img: "https://plus.unsplash.com/premium_photo-1673356700241-2ae517327564?w=400", color: "#1e3a8a" },
            { id: 4, name: "Açaí Real", segment: "acai", whatsapp: "5588222222222", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?w=400", color: "#4c1d95" }
        ];

        const PRODUCTS = [
            { id: 101, storeId: 1, cat: 'pizzas', name: "Calabresa", price: 35.0, desc: "Tradicional com cebola", img: "..." },
            { id: 102, storeId: 1, cat: 'pizzas', name: "Portuguesa", price: 42.0, desc: "Completa", img: "..." },
            { id: 201, storeId: 2, cat: 'lanches', name: "X-Burger Especial", price: 25.0, desc: "Carne 160g e queijo", img: "..." },
            { id: 301, storeId: 3, cat: 'remedios', name: "Vitamina C", price: 15.0, desc: "10 comprimidos", img: "..." }
        ];

        let currentStore = null;
        let cart = [];
        let paymentMethod = "";

        // --- 2. NAVEGAÇÃO E RENDERIZAÇÃO ---

        function renderHome() {
            currentStore = null;
            cart = [];
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('cart-footer').classList.add('hidden');
            document.getElementById('category-nav').classList.remove('hidden');
            document.getElementById('header-title').innerText = "Cardápio Cariri";
            document.getElementById('header-subtitle').innerText = "As melhores lojas da região";
            
            const container = document.getElementById('main-content');
            renderStoreList(STORES);
        }

        function renderStoreList(list) {
            const container = document.getElementById('main-content');
            container.innerHTML = list.map(store => `
                <div onclick="openStore(${store.id})" class="bg-white rounded-3xl overflow-hidden shadow-sm border border-stone-100 cursor-pointer hover:shadow-md transition-all group">
                    <div class="h-32 bg-cover bg-center" style="background-image: url('${store.img}')"></div>
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg group-hover:text-orange-700">${store.name}</h3>
                            <p class="text-xs text-stone-400 uppercase tracking-widest">${store.segment}</p>
                        </div>
                        <span class="bg-green-100 text-green-700 text-[10px] font-bold px-3 py-1 rounded-full">ABERTO</span>
                    </div>
                </div>
            `).join('');
        }

        function openStore(id) {
            currentStore = STORES.find(s => s.id === id);
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('cart-footer').classList.remove('hidden');
            document.getElementById('category-nav').classList.add('hidden');
            document.getElementById('header-title').innerText = currentStore.name;
            document.getElementById('header-subtitle').innerText = "Faça seu pedido agora";

            const storeProducts = PRODUCTS.filter(p => p.storeId === id);
            renderMenu(storeProducts);
            window.scrollTo(0,0);
        }

        function renderMenu(items) {
            const container = document.getElementById('main-content');
            if(items.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center py-10 text-stone-400">Nenhum produto cadastrado nesta loja.</p>`;
                return;
            }
            container.innerHTML = items.map(p => `
                <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                    <div class="w-20 h-20 bg-stone-100 rounded-xl"></div>
                    <div class="flex-1">
                        <h3 class="font-bold text-sm">${p.name}</h3>
                        <p class="text-[11px] text-stone-500">${p.desc}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-orange-700 font-bold">R$ ${p.price.toFixed(2)}</span>
                            <button onclick="addToCart(${p.id})" class="bg-stone-900 text-white px-4 py-1.5 rounded-lg text-xs font-bold">Adicionar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- 3. LÓGICA DE FILTROS E BUSCA ---

        function filterBySegment(seg) {
            document.querySelectorAll('.segment-btn').forEach(btn => btn.classList.remove('active-filter'));
            event.target.classList.add('active-filter');
            
            if(seg === 'todos') {
                renderStoreList(STORES);
            } else {
                const filtered = STORES.filter(s => s.segment === seg);
                renderStoreList(filtered);
            }
        }

        function handleSearch() {
            const term = document.getElementById('search-input').value.toLowerCase();
            if(!currentStore) {
                const filtered = STORES.filter(s => s.name.toLowerCase().includes(term) || s.segment.toLowerCase().includes(term));
                renderStoreList(filtered);
            } else {
                const storeProducts = PRODUCTS.filter(p => p.storeId === currentStore.id && p.name.toLowerCase().includes(term));
                renderMenu(storeProducts);
            }
        }

        // --- 4. CARRINHO E WHATSAPP ---

        function addToCart(id) {
            const p = PRODUCTS.find(x => x.id === id);
            cart.push({...p});
            updateCartUI();
        }

        function updateCartUI() {
            const d = document.getElementById('delivery-location');
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee') || 0);
            const totalItems = cart.reduce((a, c) => a + c.price, 0);
            
            document.getElementById('cart-total').innerText = `R$ ${(totalItems + fee).toFixed(2)}`;
            document.getElementById('summary-total').innerText = `R$ ${(totalItems + fee).toFixed(2)}`;
            
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-3 rounded-xl">
                    <div>
                        <p class="font-bold text-sm">${item.name}</p>
                        <p class="text-xs text-orange-700">R$ ${item.price.toFixed(2)}</p>
                    </div>
                    <button onclick="removeItem(${i})" class="text-red-500"><i class="fa fa-trash"></i></button>
                </div>
            `).join('');
        }

        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }
        function toggleModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }
        function setPayment(m) { 
            paymentMethod = m; 
            document.querySelectorAll('.pay-btn').forEach(b => b.style.borderColor = "#e7e5e4");
            event.target.style.borderColor = "#c2410c";
        }

        function sendOrder() {
            const n = document.getElementById('cust-name').value;
            const a = document.getElementById('cust-address').value;
            const d = document.getElementById('delivery-location');
            
            if(!n || !a || paymentMethod === "" || d.value === "0") return alert("Preencha todos os dados!");

            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee'));
            const total = cart.reduce((acc, cur) => acc + cur.price, 0) + fee;

            let msg = `*PEDIDO - ${currentStore.name}*\n\n`;
            msg += `*Cliente:* ${n}\n*Endereço:* ${a}\n*Bairro:* ${d.value}\n*Pagamento:* ${paymentMethod}\n\n*ITENS:*\n`;
            cart.forEach(i => msg += `• ${i.name} (R$ ${i.price.toFixed(2)})\n`);
            msg += `\n*Entrega:* R$ ${fee.toFixed(2)}\n*TOTAL: R$ ${total.toFixed(2)}*`;

            window.open(`https://api.whatsapp.com/send?phone=${currentStore.whatsapp}&text=${encodeURIComponent(msg)}`);
        }

        // Inicialização
        renderHome();
    </script>
</body>
</html>
