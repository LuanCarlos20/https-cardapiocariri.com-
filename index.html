<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }
        .animate-pulse-green { animation: pulse-green 2s infinite; }
        
        .payment-btn.active { background-color: #c2410c !important; color: white !important; border-color: #c2410c !important; }
        .sabor-card.selected { border-color: #c2410c; background-color: #fff7ed; shadow: inset 0 0 0 2px #c2410c; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24">

    <header class="w-full h-[260px] bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-center p-4">
            <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-20 h-20 rounded-full object-cover border-2 border-white shadow-xl mb-2">
            <h1 class="text-white text-2xl font-serif font-bold">Pizzaria A Portuguesa</h1>
            <div id="status-loja" class="mt-2 text-white px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-2 bg-green-600 animate-pulse-green">
                <i class="fa fa-clock"></i> <span>Aberto Agora</span>
            </div>
            <p class="text-white/80 text-[11px] mt-2 font-medium">Dom a Seg: 16h às 00h • <span class="text-red-300">Terça: Fechado</span></p>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-md z-40 overflow-x-auto whitespace-nowrap p-3 flex gap-3 scrollbar-hide">
        <button onclick="filterCat('pizzas')" class="px-5 py-2 rounded-full bg-orange-700 text-white text-sm font-semibold">Pizzas</button>
        <button onclick="filterCat('bebidas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm font-medium">Bebidas</button>
    </nav>

    <main class="max-w-4xl mx-auto p-4" id="menu-pizzas">
        <h2 class="text-lg font-bold mb-4 border-l-4 border-orange-700 pl-2">Escolha o Tamanho da Pizza</h2>
        <div class="grid grid-cols-1 gap-3">
            <button onclick="abrirSabores('P')" class="bg-white p-5 rounded-2xl shadow-sm border flex justify-between items-center active:scale-95 transition">
                <div class="text-left"><span class="block font-bold">Pizza Pequena (P)</span><p class="text-xs text-stone-500">4 fatias • Até 2 sabores</p></div>
                <i class="fa fa-chevron-right text-orange-700"></i>
            </button>
            <button onclick="abrirSabores('M')" class="bg-white p-5 rounded-2xl shadow-sm border flex justify-between items-center active:scale-95 transition">
                <div class="text-left"><span class="block font-bold">Pizza Média (M)</span><p class="text-xs text-stone-500">6 fatias • Até 2 sabores</p></div>
                <i class="fa fa-chevron-right text-orange-700"></i>
            </button>
            <button onclick="abrirSabores('G')" class="bg-white p-5 rounded-2xl shadow-sm border flex justify-between items-center active:scale-95 transition">
                <div class="text-left"><span class="block font-bold">Pizza Grande (G)</span><p class="text-xs text-stone-500">8 fatias • Até 2 sabores</p></div>
                <i class="fa fa-chevron-right text-orange-700"></i>
            </button>
        </div>
    </main>

    <div id="modal-sabores" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-end sm:items-center justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl h-[90vh] rounded-t-3xl flex flex-col overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 id="titulo-modal" class="font-bold text-lg">Escolha os Sabores</h2>
                <button onclick="fecharModal()" class="text-3xl">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-2 scrollbar-hide" id="lista-sabores">
                </div>

            <div class="p-4 bg-stone-50 border-t space-y-4">
                <p class="text-xs font-bold">Borda Recheada:</p>
                <div class="grid grid-cols-2 gap-2" id="lista-bordas"></div>
                <textarea id="obs" placeholder="Observações (ex: sem cebola)" class="w-full border rounded-xl p-3 text-sm"></textarea>
                <button onclick="confirmarPizza()" class="w-full bg-orange-700 text-white font-bold py-4 rounded-2xl shadow-lg">Adicionar ao Carrinho</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex items-center justify-between z-50 shadow-lg">
        <div>
            <span class="text-[10px] text-stone-500 font-bold uppercase">Total</span>
            <span class="text-xl font-bold text-orange-800 block" id="total-carrinho">R$ 0,00</span>
        </div>
        <button onclick="abrirCarrinho()" class="bg-orange-700 text-white px-8 py-3.5 rounded-2xl font-bold">Ver Pedido</button>
    </footer>

    <div id="modal-carrinho" class="fixed inset-0 bg-black/70 z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 max-h-[85vh] overflow-y-auto relative">
            <button onclick="document.getElementById('modal-carrinho').classList.add('hidden')" class="absolute top-4 right-4 text-2xl">&times;</button>
            <h2 class="text-xl font-bold mb-4 border-b pb-2 text-stone-800">Meu Carrinho</h2>
            <div id="itens-carrinho" class="space-y-3 mb-4"></div>
            
            <div class="space-y-3 border-t pt-4">
                <select id="bairro" onchange="calcTotal()" class="w-full border p-3 rounded-xl text-sm">
                    <option value="Centro" data-taxa="3">Centro (R$ 3,00)</option>
                    <option value="Vila" data-taxa="4">Vila (R$ 4,00)</option>
                </select>
                <input type="text" id="nome" placeholder="Seu Nome" class="w-full border p-3 rounded-xl text-sm">
                <input type="text" id="rua" placeholder="Endereço Completo" class="w-full border p-3 rounded-xl text-sm">
                <button onclick="enviarWhats()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg">Finalizar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        const WHATS_LOJA = "5588992791644";
        let cart = [];
        let curSize = "";
        let curFlavors = [];
        let curBorder = { name: "Sem Borda", price: 0 };

        const SABORES = [
            { id: 1, nome: "Americana", preco: 36, desc: "Presunto, mussarela, ovos e bacon." },
            { id: 2, nome: "Atum", preco: 31, desc: "Atum ralado e cebola." },
            { id: 3, nome: "Bacon", preco: 33, desc: "Mussarela e bacon crocante." },
            { id: 10, nome: "Calabresa com Mussarela", preco: 33, desc: "Calabresa fatiada e mussarela." },
            { id: 17, nome: "Frango c/ Catupiry", preco: 33, desc: "Frango desfiado com catupiry." },
            { id: 38, nome: "Portuguesa", preco: 36, desc: "Presunto, ovos, cebola, ervilha e mussarela." }
        ];

        const BORDAS = [
            { name: "Sem Borda", price: 0 },
            { name: "Cheddar", price: 7 },
            { name: "Catupiry", price: 7 },
            { name: "Chocolate", price: 8 }
        ];

        function abrirSabores(tam) {
            curSize = tam;
            curFlavors = [];
            curBorder = BORDAS[0];
            document.getElementById('titulo-modal').innerText = `Pizza ${tam} (Escolha até 2)`;
            document.getElementById('modal-sabores').classList.remove('hidden');
            renderSabores();
        }

        function renderSabores() {
            const list = document.getElementById('lista-sabores');
            list.innerHTML = SABORES.map(s => `
                <div onclick="selectSabor(${s.id})" id="s-${s.id}" class="sabor-card flex justify-between items-center p-3 border rounded-xl bg-white cursor-pointer transition-all ${curFlavors.includes(s.id) ? 'selected' : ''}">
                    <div class="text-left pr-2">
                        <p class="font-bold text-sm">${s.id.toString().padStart(2, '0')} ${s.nome}</p>
                        <p class="text-[10px] text-stone-500">${s.desc}</p>
                    </div>
                    <span class="font-bold text-orange-800 text-sm">R$ ${s.preco.toFixed(2)}</span>
                </div>
            `).join('');

            const bList = document.getElementById('lista-bordas');
            bList.innerHTML = BORDAS.map((b, i) => `
                <button onclick="selectBorda(${i})" class="border p-2 rounded-xl text-[10px] font-bold ${curBorder.name === b.name ? 'bg-orange-700 text-white' : 'bg-white'}">
                    ${b.name} (+R$ ${b.price})
                </button>
            `).join('');
        }

        function selectSabor(id) {
            const idx = curFlavors.indexOf(id);
            if (idx > -1) curFlavors.splice(idx, 1);
            else {
                if (curFlavors.length >= 2) curFlavors.shift();
                curFlavors.push(id);
            }
            renderSabores();
        }

        function selectBorda(i) {
            curBorder = BORDAS[i];
            renderSabores();
        }

        function confirmarPizza() {
            if (curFlavors.length === 0) return alert("Escolha o sabor!");
            const itens = curFlavors.map(id => SABORES.find(s => s.id === id));
            const preco = Math.max(...itens.map(i => i.preco)) + curBorder.price;
            const nomeFinal = itens.length === 1 ? `Pizza ${curSize} ${itens[0].nome}` : `Pizza ${curSize} (1/2 ${itens[0].nome} + 1/2 ${itens[1].nome})`;
            
            cart.push({ nome: nomeFinal, preco: preco, borda: curBorder.name, obs: document.getElementById('obs').value });
            fecharModal();
            calcTotal();
        }

        function fecharModal() {
            document.getElementById('modal-sabores').classList.add('hidden');
            document.getElementById('obs').value = "";
        }

        function calcTotal() {
            const b = document.getElementById('bairro');
            const taxa = parseFloat(b.options[b.selectedIndex].getAttribute('data-taxa') || 0);
            const total = cart.reduce((a, b) => a + b.preco, 0) + taxa;
            document.getElementById('total-carrinho').innerText = `R$ ${total.toFixed(2)}`;
        }

        function abrirCarrinho() {
            if (cart.length === 0) return alert("Adicione itens!");
            document.getElementById('modal-carrinho').classList.remove('hidden');
            const lista = document.getElementById('itens-carrinho');
            lista.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-3 rounded-xl border text-sm">
                    <div>
                        <p class="font-bold">${item.nome}</p>
                        <p class="text-[10px] text-stone-500">Borda: ${item.borda}</p>
                    </div>
                    <button onclick="cart.splice(${i}, 1); abrirCarrinho(); calcTotal();" class="text-red-500 font-bold">Remover</button>
                </div>
            `).join('');
        }

        function enviarWhats() {
            const n = document.getElementById('nome').value, r = document.getElementById('rua').value, b = document.getElementById('bairro').value;
            if (!n || !r) return alert("Preencha os dados!");
            
            let msg = `*NOVO PEDIDO - A PORTUGUESA*\n\n👤 *Cliente:* ${n}\n📍 *End:* ${r}\n🏘️ *Bairro:* ${b}\n\n*ITENS:*\n`;
            cart.forEach(i => msg += `• ${i.nome}\n  └ Borda: ${i.borda} ${i.obs ? '\n  └ Obs: '+i.obs : ''}\n`);
            msg += `\n*TOTAL: ${document.getElementById('total-carrinho').innerText}*`;
            
            window.open(`https://api.whatsapp.com/send?phone=${WHATS_LOJA}&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
