<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria a Portuguesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .payment-btn.active { background-color: #c2410c !important; color: white !important; border-color: #c2410c !important; }
        
        /* Estilo para as opções de sabores selecionadas */
        .sabor-item.selected { border-color: #22c55e; background-color: #f0fdf4; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24">

    <header class="w-full h-[260px] bg-[url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=1000')] bg-cover bg-center relative">
        <div class="absolute inset-0 bg-black/50 flex flex-col items-center justify-center text-center p-4">
            <img src="https://matafoomi.com.br/images/template/d311c8036e92213f64f1b35b92d1e2b4815c8ffa.jpg" class="w-20 h-20 rounded-full object-cover border-2 border-white mb-2">
            <h1 class="text-white text-2xl font-bold">Pizzaria A Portuguesa</h1>
        </div>
    </header>

    <nav class="sticky top-0 bg-white shadow-md z-40 overflow-x-auto p-3 flex gap-3 scrollbar-hide">
        <button onclick="filterCategory('todas')" class="px-5 py-2 rounded-full bg-orange-700 text-white text-sm font-semibold">Todas</button>
        <button onclick="filterCategory('pizzas')" class="px-5 py-2 rounded-full bg-stone-100 text-sm">Pizzas</button>
        <button onclick="filterCategory('esfirras')" class="px-5 py-2 rounded-full bg-stone-100 text-sm">Esfirras</button>
    </nav>

    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="menu-container"></main>

    <div id="pizza-modal" class="fixed inset-0 bg-black/70 z-[70] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-2xl max-h-[90vh] overflow-hidden flex flex-col relative">
            <div class="p-4 border-b flex justify-between items-center bg-white sticky top-0">
                <h2 id="modal-pizza-title" class="font-bold text-lg uppercase">PIZZA (P)</h2>
                <button onclick="closePizzaModal()" class="bg-red-500 text-white w-8 h-8 rounded-md text-xl">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-white scrollbar-hide">
                <div id="modal-pizza-price" class="text-2xl font-bold text-green-600 mb-4">R$ 0,00</div>
                
                <p class="font-bold text-sm border-b pb-1">Opções de Sabores <span class="float-right font-normal text-xs text-stone-500">Escolha até 2</span></p>
                <div id="sabores-lista" class="space-y-3">
                    </div>

                <div class="bg-stone-50 p-4 rounded-xl border border-stone-200">
                    <p class="font-bold text-xs uppercase mb-3 tracking-widest text-stone-600" id="borda-titulo">BORDAS RECHEADAS P</p>
                    <div id="bordas-lista" class="space-y-2">
                        </div>
                </div>

                <div>
                    <label class="font-bold text-sm">Observação</label>
                    <input type="text" id="pizza-obs" class="w-full border rounded-lg p-3 mt-1 outline-none focus:ring-1 focus:ring-green-500" placeholder="Ex: Tirar cebola...">
                </div>

                <div class="flex items-center justify-between bg-stone-100 p-2 rounded-xl">
                    <span class="font-bold ml-2">Quantidade</span>
                    <div class="flex items-center gap-4">
                        <button onclick="updateQty(-1)" class="bg-red-500 text-white w-10 h-10 rounded-lg font-bold">-</button>
                        <span id="pizza-qty" class="font-bold text-lg">1</span>
                        <button onclick="updateQty(1)" class="bg-green-500 text-white w-10 h-10 rounded-lg font-bold">+</button>
                    </div>
                </div>
            </div>

            <div class="p-4 border-t">
                <button onclick="confirmPizza()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl uppercase tracking-wider">
                    Adicionar ao Carrinho
                </button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 flex items-center justify-between z-50">
        <div class="flex flex-col"><span class="text-[10px] font-bold text-stone-500 uppercase">Total + Entrega</span><span class="text-xl font-bold text-orange-800" id="cart-total">R$ 0,00</span></div>
        <button onclick="toggleCartModal(true)" class="bg-orange-700 text-white px-8 py-3.5 rounded-2xl font-bold">Ver Pedido</button>
    </footer>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 relative max-h-[90vh] overflow-y-auto">
            <button onclick="toggleCartModal(false)" class="absolute top-4 right-4 text-3xl">&times;</button>
            <h2 class="text-2xl font-bold mb-4">Meu Pedido</h2>
            <div id="cart-items" class="space-y-4 mb-4"></div>
            
            <div class="bg-stone-50 p-4 rounded-2xl border mb-4">
                <label class="font-bold block mb-2">Bairro para Entrega:</label>
                <select id="delivery-location" onchange="updateCartUI()" class="w-full p-3 rounded-xl border">
                    <option value="0" data-fee="0">Selecione seu bairro...</option>
                    <option value="Centro" data-fee="3.00">Centro (R$ 3,00)</option>
                    <option value="Cirolândia" data-fee="3.50">Cirolândia (R$ 3,50)</option>
                    <option value="Outros" data-fee="6.00">Outros (R$ 6,00)</option>
                </select>
                <div class="flex justify-between font-bold text-lg text-orange-800 mt-2 border-t pt-2">
                    <span>Total Final:</span> <span id="summary-total">R$ 0,00</span>
                </div>
            </div>

            <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full border rounded-xl p-3 mb-2">
            <input type="text" id="cust-address" placeholder="Endereço Completo" class="w-full border rounded-xl p-3 mb-4">
            
            <div class="grid grid-cols-3 gap-2 mb-4">
                <button onclick="setPayment('Pix')" id="pay-Pix" class="payment-btn border py-2 rounded-xl font-bold">Pix</button>
                <button onclick="setPayment('Cartao')" id="pay-Cartao" class="payment-btn border py-2 rounded-xl font-bold">Cartão</button>
                <button onclick="setPayment('Dinheiro')" id="pay-Dinheiro" class="payment-btn border py-2 rounded-xl font-bold">Dinheiro</button>
            </div>

            <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl">Finalizar no WhatsApp</button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5588992791644";
        const SABORES = [
            { id: 1, nome: "01 americana", preco: 36, desc: "molho, presunto, mussarela, ovos, bacon e orégano" },
            { id: 2, nome: "02 atum", preco: 31, desc: "molho, atum ralado, cebola e orégano" },
            { id: 3, nome: "03 bacon", preco: 33, desc: "molho, mussarela, bacon e orégano" },
            { id: 10, nome: "10 calabresa com mussarela", preco: 33, desc: "molho, mussarela, calabresa e orégano" }
        ];

        const BORDAS = [
            { nome: "cheddar", preco: 7 },
            { nome: "catupiry", preco: 7 },
            { nome: "chocolate", preco: 8 }
        ];

        let cart = [];
        let curPizza = { size: '', flavors: [], border: null, qty: 1 };
        let paymentMethod = "";

        // RENDER MENU PRINCIPAL (COM PIZZAS P, M, G, GG)
        function renderMenu(cat = 'todas') {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";
            
            if(cat === 'todas' || cat === 'pizzas') {
                const sizes = ['P', 'M', 'G', 'GG'];
                sizes.forEach(s => {
                    container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border flex gap-4 items-center">
                        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 text-left">
                            <h3 class="font-bold">PIZZA (${s})</h3>
                            <button onclick="openPizzaModal('${s}')" class="mt-2 w-full bg-green-500 text-white py-2 rounded-xl font-bold text-xs">Ver Valores / Escolher</button>
                        </div>
                    </div>`;
                });
            }
        }

        // LÓGICA DO MODAL DE PIZZA
        function openPizzaModal(size) {
            curPizza = { size, flavors: [], border: null, qty: 1 };
            document.getElementById('modal-pizza-title').innerText = `PIZZA (${size})`;
            document.getElementById('borda-titulo').innerText = `BORDAS RECHEADAS ${size}`;
            document.getElementById('pizza-qty').innerText = "1";
            document.getElementById('pizza-obs').value = "";
            
            renderSabores();
            renderBordas();
            updateModalPrice();
            document.getElementById('pizza-modal').classList.remove('hidden');
        }

        function renderSabores() {
            const container = document.getElementById('sabores-lista');
            container.innerHTML = SABORES.map(s => `
                <div class="flex items-center justify-between p-2 border-b">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" onchange="toggleSabor(${s.id})" ${curPizza.flavors.includes(s.id) ? 'checked' : ''} class="w-5 h-5 accent-green-600">
                        <div>
                            <p class="text-sm font-bold uppercase">${s.nome}</p>
                            <p class="text-[10px] text-stone-500">${s.desc}</p>
                        </div>
                    </div>
                    <span class="text-sm font-bold">R$ ${s.preco.toFixed(2)}</span>
                </div>
            `).join('');
        }

        function renderBordas() {
            const container = document.getElementById('bordas-lista');
            container.innerHTML = BORDAS.map(b => `
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <input type="radio" name="borda" onchange="setBorda('${b.nome}')" class="w-5 h-5 accent-green-600">
                        <span class="text-sm uppercase">${b.nome}</span>
                    </div>
                    <span class="text-sm font-bold">R$ ${b.preco.toFixed(2)}</span>
                </div>
            `).join('');
        }

        function toggleSabor(id) {
            const idx = curPizza.flavors.indexOf(id);
            if(idx > -1) curPizza.flavors.splice(idx, 1);
            else if(curPizza.flavors.length < 2) curPizza.flavors.push(id);
            else { renderSabores(); return alert("Máximo 2 sabores!"); }
            updateModalPrice();
        }

        function setBorda(nome) {
            curPizza.border = BORDAS.find(b => b.nome === nome);
            updateModalPrice();
        }

        function updateQty(val) {
            curPizza.qty = Math.max(1, curPizza.qty + val);
            document.getElementById('pizza-qty').innerText = curPizza.qty;
            updateModalPrice();
        }

        function updateModalPrice() {
            const precos = curPizza.flavors.map(id => SABORES.find(s => s.id === id).preco);
            const maiorPreco = precos.length ? Math.max(...precos) : 0;
            const bordaPreco = curPizza.border ? curPizza.border.preco : 0;
            const total = (maiorPreco + bordaPreco) * curPizza.qty;
            document.getElementById('modal-pizza-price').innerText = `R$ ${total.toFixed(2)}`;
        }

        function confirmPizza() {
            if(!curPizza.flavors.length) return alert("Escolha pelo menos 1 sabor!");
            const flavorsNames = curPizza.flavors.map(id => SABORES.find(s => s.id === id).nome).join(' / ');
            const precos = curPizza.flavors.map(id => SABORES.find(s => s.id === id).preco);
            const price = (Math.max(...precos) + (curPizza.border ? curPizza.border.preco : 0)) * curPizza.qty;
            
            cart.push({
                name: `PIZZA (${curPizza.size}) - ${flavorsNames}`,
                price: price,
                extra: curPizza.border ? `Borda: ${curPizza.border.nome}` : "",
                obs: document.getElementById('pizza-obs').value,
                qty: curPizza.qty
            });
            
            closePizzaModal();
            updateCartUI();
        }

        function closePizzaModal() { document.getElementById('pizza-modal').classList.add('hidden'); }

        // LÓGICA DO CARRINHO (SOMA DE ENTREGA CORRIGIDA)
        function updateCartUI() {
            const d = document.getElementById('delivery-location');
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee') || 0);
            const subtotal = cart.reduce((a, c) => a + c.price, 0);
            const total = subtotal + fee;

            document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('summary-total').innerText = `R$ ${total.toFixed(2)}`;
            
            document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between border-b pb-2">
                    <div class="text-left">
                        <p class="font-bold text-sm">${item.qty}x ${item.name}</p>
                        <p class="text-[10px] text-stone-500">${item.extra} ${item.obs ? '| '+item.obs : ''}</p>
                    </div>
                    <button onclick="cart.splice(${i}, 1); updateCartUI();" class="text-red-500"><i class="fa fa-trash"></i></button>
                </div>`).join('');
        }

        function sendOrder() {
            const d = document.getElementById('delivery-location'), n = document.getElementById('cust-name').value, a = document.getElementById('cust-address').value;
            if(!cart.length || d.value === "0" || !n || !a || !paymentMethod) return alert("Preencha tudo!");
            
            const fee = parseFloat(d.options[d.selectedIndex].getAttribute('data-fee'));
            const subtotal = cart.reduce((a, c) => a + c.price, 0);
            
            let msg = `*PEDIDO - PORTUGUESA*\n\n👤 ${n}\n📍 ${a}\n🏘️ Bairro: ${d.value}\n💳 ${paymentMethod}\n\n`;
            cart.forEach(i => msg += `• ${i.qty}x ${i.name}\n${i.extra ? '  '+i.extra : ''}\n`);
            msg += `\n*Subtotal:* R$ ${subtotal.toFixed(2)}\n*Entrega:* R$ ${fee.toFixed(2)}\n*TOTAL: R$ ${(subtotal+fee).toFixed(2)}*`;
            
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        function setPayment(m) { paymentMethod = m; document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('active')); document.getElementById(`pay-${m}`).classList.add('active'); }
        function toggleCartModal(s) { document.getElementById('cart-modal').classList.toggle('hidden', !s); }
        function filterCategory(c) { renderMenu(c); }

        renderMenu();
    </script>
</body>
</html>
