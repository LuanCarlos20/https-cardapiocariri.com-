<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Cariri - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .slider { overflow: hidden; width: 100%; border-radius: 16px; position: relative; height: 160px; }
        .slides { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .slide { min-width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-24">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-orange-700">Cardápio Cariri</h1>
            <p class="text-[10px] text-gray-400">Portal de Lojas</p>
        </div>
        <button onclick="toggleAdminModal(true)" class="bg-stone-100 p-2 rounded-full text-stone-500 hover:text-orange-700 transition">
            <i class="fa fa-cog"></i> Admin
        </button>
    </header>

    <main id="client-view" class="max-w-6xl mx-auto p-4">
        <section class="slider mb-6 shadow-lg">
            <div class="slides" id="slider-container">
                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800" class="slide">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800" class="slide">
            </div>
        </section>

        <div class="relative mb-6">
            <input type="text" id="search" oninput="renderStores()" placeholder="Buscar loja..." class="w-full bg-white border border-stone-200 rounded-2xl py-4 pl-12 outline-none focus:ring-2 focus:ring-orange-500 shadow-sm">
            <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
        </div>

        <div id="store-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <div id="admin-modal" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-3xl max-h-[90vh] overflow-y-auto p-6 relative">
            <button onclick="toggleAdminModal(false)" class="absolute top-4 right-4 text-2xl">&times;</button>
            
            <div id="admin-login">
                <h2 class="text-2xl font-bold mb-4">Acesso do Lojista</h2>
                <input type="password" id="admin-pass" placeholder="Senha da Loja" class="w-full p-4 border rounded-xl mb-4">
                <button onclick="loginAdmin()" class="w-full bg-orange-700 text-white py-4 rounded-xl font-bold">Entrar no Painel</button>
                <p class="text-[10px] text-center mt-4 text-gray-400 text-left">Dica: A senha padrão é '123'</p>
            </div>

            <div id="admin-panel" class="hidden">
                <h2 class="text-2xl font-bold mb-2">Painel de Controle</h2>
                <p id="admin-store-name" class="text-orange-700 font-bold mb-6 italic"></p>

                <div class="space-y-6">
                    <div class="bg-stone-50 p-4 rounded-2xl border">
                        <h3 class="font-bold mb-3 border-b pb-2">Dados da Loja</h3>
                        <div class="grid grid-cols-1 gap-3">
                            <input type="text" id="edit-store-name" placeholder="Nome da Loja" class="p-3 border rounded-lg">
                            <input type="text" id="edit-store-wa" placeholder="WhatsApp (Ex: 5588992791644)" class="p-3 border rounded-lg">
                            <input type="text" id="edit-store-img" placeholder="Link da Imagem/Logo" class="p-3 border rounded-lg">
                            <button onclick="saveStoreData()" class="bg-green-600 text-white py-2 rounded-lg font-bold">Salvar Alterações</button>
                        </div>
                    </div>

                    <div class="bg-stone-50 p-4 rounded-2xl border">
                        <h3 class="font-bold mb-3 border-b pb-2">Cadastrar Novo Produto</h3>
                        <div class="grid grid-cols-1 gap-3">
                            <input type="text" id="new-prod-name" placeholder="Nome do Produto" class="p-3 border rounded-lg">
                            <input type="number" id="new-prod-price" placeholder="Preço (Ex: 35.00)" class="p-3 border rounded-lg">
                            <input type="text" id="new-prod-desc" placeholder="Descrição Curta" class="p-3 border rounded-lg">
                            <button onclick="addProduct()" class="bg-orange-700 text-white py-2 rounded-lg font-bold">Adicionar ao Cardápio</button>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-2xl border">
                        <h3 class="font-bold mb-3">Meus Produtos</h3>
                        <div id="admin-product-list" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados Iniciais (Simulando um banco de dados que o LocalStorage vai assumir)
        let INITIAL_DATA = [
            { 
                id: 1, 
                name: "Pizzaria A Portuguesa", 
                whatsapp: "5588992791644", 
                img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400",
                pass: "123",
                products: [
                    { id: 101, name: "Pizza de Calabresa", price: 33.00, desc: "Mussarela e calabresa" }
                ]
            },
            { 
                id: 2, 
                name: "Império do Açaí", 
                whatsapp: "5588999999999", 
                img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?w=400",
                pass: "321",
                products: []
            }
        ];

        // Carrega dados do LocalStorage ou inicia com os padrões
        let stores = JSON.parse(localStorage.getItem('cariri_stores')) || INITIAL_DATA;
        let currentAdminStoreId = null;

        function save() {
            localStorage.setItem('cariri_stores', JSON.stringify(stores));
            renderStores();
        }

        // --- FUNÇÕES DO CLIENTE ---
        function renderStores() {
            const grid = document.getElementById('store-grid');
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = stores.filter(s => s.name.toLowerCase().includes(term));

            grid.innerHTML = filtered.map(s => `
                <div class="bg-white rounded-2xl shadow-sm border p-3 flex items-center gap-4 cursor-pointer hover:border-orange-500 transition">
                    <img src="${s.img}" class="w-20 h-20 rounded-xl object-cover">
                    <div class="flex-1">
                        <h3 class="font-bold text-sm text-gray-800">${s.name}</h3>
                        <p class="text-[10px] text-gray-400 uppercase">${s.products.length} produtos disponíveis</p>
                        <button onclick="openWhatsApp(${s.id})" class="mt-2 text-green-600 text-[10px] font-bold border border-green-200 px-2 py-1 rounded-full">Ver Cardápio</button>
                    </div>
                </div>
            `).join('');
        }

        function openWhatsApp(id) {
            const store = stores.find(s => s.id === id);
            let msg = `*CARDÁPIO CARIRI - ${store.name}*\n\n🛒 *PRODUTOS:*\n`;
            store.products.forEach(p => msg += `• ${p.name} - R$ ${p.price.toFixed(2)}\n`);
            window.open(`https://api.whatsapp.com/send?phone=${store.whatsapp}&text=${encodeURIComponent(msg)}`);
        }

        // --- FUNÇÕES ADMIN ---
        function toggleAdminModal(show) {
            document.getElementById('admin-modal').classList.toggle('hidden', !show);
            if(!show) {
                document.getElementById('admin-login').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('admin-pass').value = "";
            }
        }

        function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            const store = stores.find(s => s.pass === pass);

            if(store) {
                currentAdminStoreId = store.id;
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadAdminPanel(store);
            } else {
                alert("Senha incorreta!");
            }
        }

        function loadAdminPanel(store) {
            document.getElementById('admin-store-name').innerText = store.name;
            document.getElementById('edit-store-name').value = store.name;
            document.getElementById('edit-store-wa').value = store.whatsapp;
            document.getElementById('edit-store-img').value = store.img;
            renderAdminProducts(store);
        }

        function saveStoreData() {
            const store = stores.find(s => s.id === currentAdminStoreId);
            store.name = document.getElementById('edit-store-name').value;
            store.whatsapp = document.getElementById('edit-store-wa').value;
            store.img = document.getElementById('edit-store-img').value;
            save();
            alert("Dados atualizados!");
        }

        function addProduct() {
            const name = document.getElementById('new-prod-name').value;
            const price = parseFloat(document.getElementById('new-prod-price').value);
            const desc = document.getElementById('new-prod-desc').value;

            if(!name || !price) return alert("Preencha nome e preço!");

            const store = stores.find(s => s.id === currentAdminStoreId);
            store.products.push({ id: Date.now(), name, price, desc });
            
            save();
            renderAdminProducts(store);
            document.getElementById('new-prod-name').value = "";
            document.getElementById('new-prod-price').value = "";
        }

        function removeProduct(prodId) {
            const store = stores.find(s => s.id === currentAdminStoreId);
            store.products = store.products.filter(p => p.id !== prodId);
            save();
            renderAdminProducts(store);
        }

        function renderAdminProducts(store) {
            const list = document.getElementById('admin-product-list');
            list.innerHTML = store.products.map(p => `
                <div class="flex justify-between items-center bg-stone-50 p-3 rounded-lg border text-sm">
                    <div>
                        <span class="font-bold">${p.name}</span> - R$ ${p.price.toFixed(2)}
                    </div>
                    <button onclick="removeProduct(${p.id})" class="text-red-500"><i class="fa fa-trash"></i></button>
                </div>
            `).join('');
        }

        // Lógica do Banner
        let currentSlide = 0;
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 2;
            document.getElementById('slider-container').style.transform = `translateX(-${currentSlide * 100}%)`;
        }, 3000);

        renderStores();
    </script>
</body>
</html>
