<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Player IPTV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      background: #000;
      color: #fff;
      text-align: center;
      font-family: Arial;
    }
    video {
      width: 100%;
      max-width: 800px;
      margin-top: 20px;
    }
    input {
      width: 80%;
      padding: 10px;
      margin-top: 20px;
    }
    button {
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>📺 Player IPTV</h2>

<input type="text" id="url" placeholder="Cole o link M3U8 aqui">
<br>
<button onclick="playVideo()">Assistir</button>

<video id="video" controls></video>

<script>
function playVideo() {
  var video = document.getElementById('video');
  var videoSrc = document.getElementById('url').value;

  if (Hls.isSupported()) {
    var hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
    video.addEventListener('loadedmetadata', function() {
      video.play();
    });
  } else {
    alert("Seu navegador não suporta esse formato!");
  }
}
</script>

</body>
</html>
