<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Player IPTV M3U</title>
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:Arial;">

  <h2>Player IPTV (M3U)</h2>

  <input type="text" id="m3u" placeholder="Cole o link M3U aqui" style="width:80%; padding:10px;">
  <br><br>

  <button onclick="loadM3U()">Carregar Lista</button>

  <br><br>

  <select id="channels" style="width:80%; padding:10px;" onchange="playChannel()">
    <option>Selecione um canal</option>
  </select>

  <br><br>

  <video id="video" controls autoplay width="80%"></video>

  <script>
    async function loadM3U() {
      let url = document.getElementById("m3u").value;

      try {
        let res = await fetch(url);
        let text = await res.text();

        let lines = text.split("\n");
        let select = document.getElementById("channels");
        select.innerHTML = "";

        for (let i = 0; i < lines.length; i++) {
          if (lines[i].includes("#EXTINF")) {
            let name = lines[i].split(",")[1];
            let link = lines[i + 1];

            let option = document.createElement("option");
            option.value = link;
            option.text = name;

            select.appendChild(option);
          }
        }
      } catch (e) {
        alert("Erro ao carregar lista M3U");
      }
    }

    function playChannel() {
      let video = document.getElementById("video");
      let url = document.getElementById("channels").value;

      video.src = url;
      video.play();
    }
  </script>

</body>
</html>
